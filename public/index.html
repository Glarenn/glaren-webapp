<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trendyol Kargo Etiketi</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    /* =========================================================
       YENİ KURUMSAL RENK PALETİ
       Ana Gövde: #1E2229
       Kartlar/İç Alanlar: #262B35
       Input/Menü Zeminleri: #1A1D24
       Ana Turuncu: #F27A1A
       Soft Turuncu: #FF9838
       Birincil Metin: #FFFFFF
       İkincil Metin: #A0AAB5
       Placeholder/Pasif: #626D7A
       Kenarlıklar: #38404B
    ========================================================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1E2229; color: #FFFFFF; font-family: system-ui, sans-serif; }
    
    input[type=text], input[type=password], input[type=number] {
      width: 100%; padding: 7px 10px; border-radius: 6px;
      border: 1px solid #38404B; background: #1A1D24;
      color: #FFFFFF; font-size: 12px; outline: none;
      transition: border-color 0.2s;
    }
    input[type=text]:focus, input[type=password]:focus, input[type=number]:focus {
      border-color: #F27A1A;
    }
    ::placeholder { color: #626D7A; opacity: 1; }
    input[type=checkbox] { accent-color: #F27A1A; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1A1D24; }
    ::-webkit-scrollbar-thumb { background: #38404B; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #626D7A; }

    @media print {
      #app { display: none !important; }
      #print-area { display: block !important; }
      #print-area > div { page-break-after: always; page-break-inside: avoid; }
      #print-area > div:last-child { page-break-after: avoid !important; }
    }
    #print-area { display: none; }

    /* Kargo Tablosu Karanlık Tema Uyarlaması */
    .kargo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      background: #262B35;
      color: #FFFFFF;
    }
    .kargo-table th {
      background: #1A1D24;
      border-bottom: 2px solid #38404B;
      border-right: 1px solid #38404B;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: #FFFFFF;
      white-space: nowrap;
    }
    .kargo-table th:last-child { border-right: none; }
    .kargo-table td {
      border-bottom: 1px solid #38404B;
      border-right: 1px solid #38404B;
      padding: 12px;
      vertical-align: top;
    }
    .kargo-table td:last-child { border-right: none; }
    .kargo-table tr:last-child td { border-bottom: none; }
    .kargo-table tr:hover td { background: #1E2229; } /* Hover efekti */

    .badge-cargo {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      background: #1A1D24;
      color: #FF9838;
      border: 1px solid #F27A1A;
    }
    .product-img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #38404B;
      flex-shrink: 0;
      background: #1A1D24;
    }
    .product-img-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 6px;
      border: 1px solid #38404B;
      background: #1A1D24;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .order-number {
      font-weight: 700;
      color: #F27A1A;
      font-size: 13px;
    }
    .kalan-sure {
      color: #4ade80; /* Karanlık temada açık yeşil */
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
    }
    .kalan-sure.urgent { color: #f87171; /* Karanlık temada açık kırmızı */ }
    .product-name-link {
      color: #FFFFFF;
      font-weight: 600;
      font-size: 12px;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      margin-bottom: 4px;
      transition: color 0.2s;
    }
    .product-name-link:hover { color: #FF9838; text-decoration: underline; }
    .product-detail {
      font-size: 11px;
      color: #A0AAB5;
      line-height: 1.6;
    }
    .product-detail span { color: #FFFFFF; }
    .tracking-no {
      font-family: monospace;
      font-size: 11px;
      color: #A0AAB5;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-top: 3px;
    }
    .cargo-sub {
      font-size: 10px;
      color: #626D7A;
      margin-top: 2px;
    }
    .quantity-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: #F27A1A;
      color: #fff;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .filter-btn {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #38404B;
      background: #1A1D24;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: #A0AAB5;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: #F27A1A;
      border-color: #F27A1A;
      color: #FFFFFF;
    }
    .filter-btn:hover:not(.active) {
      background: #262B35;
      border-color: #626D7A;
      color: #FFFFFF;
    }
    .search-input-kargo {
      padding: 7px 12px;
      border: 1px solid #38404B;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      width: 220px;
      background: #1A1D24;
      color: #FFFFFF;
      transition: border-color 0.2s;
    }
    .search-input-kargo:focus { border-color: #F27A1A; }
    .th-filter-icon { margin-left: 4px; opacity: 0.5; font-size: 10px; }
    
    /* Özel Buton Stili (Hover Efektleri) */
    .btn-primary { background: #F27A1A; color: #FFF; transition: background 0.2s; }
    .btn-primary:hover:not(:disabled) { background: #FF9838; }
  </style>
</head>
<body>
<div id="app"></div>
<div id="print-area"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ===================== SUNUCU TARAFLI PRINTED API =====================

async function loadPrintedFromServer() {
  try {
    const res = await fetch("api/printed");
    const data = await res.json();
    return data.ids || [];
  } catch (e) {
    console.error("Yazdırma listesi yüklenemedi:", e);
    return [];
  }
}

async function savePrintedToServer(ids) {
  try {
    await fetch("api/printed", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ids }),
    });
  } catch (e) {
    console.error("Yazdırma listesi kaydedilemedi:", e);
  }
}

async function removePrintedFromServer(id) {
  try {
    await fetch(`api/printed/${id}`, { method: "DELETE" });
  } catch (e) {
    console.error("Yazdırma işareti kaldırılamadı:", e);
  }
}

// ===================== YARDIMCI FONKSİYONLAR =====================

function sortOrders(list) {
  return [...list].sort((a, b) =>
    (b.shipmentPackageId || 0) - (a.shipmentPackageId || 0)
  );
}

function BarcodeImg({ value, height }) {
  const svgRef = useRef();
  useEffect(() => {
    if (!value || !svgRef.current) return;
    try {
      JsBarcode(svgRef.current, String(value), {
        format: "CODE128", width: 2.5, height: height,
        displayValue: false, margin: 0,
        background: "#ffffff", lineColor: "#000000",
      });
    } catch(e) { console.error("Barkod hatası:", e); }
  }, [value, height]);
  return <svg ref={svgRef} style={{display:"block", margin:"0 auto", maxWidth:"100%"}}></svg>;
}

function generateBarcodeSVG(value, height) {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  try {
    JsBarcode(svg, String(value), {
      format: "CODE128", width: 2.5, height: height,
      displayValue: false, margin: 0,
      background: "#ffffff", lineColor: "#000000",
    });
  } catch(e) { console.error("Barkod hatası:", e); }
  return svg.outerHTML;
}

// ETİKET BÖLÜMÜ DAİMA SİYAH/BEYAZ KALMALIDIR (Yazıcı İçin)
function LabelHTML({ order, settings, logoDataUrl, orderIndex }) {
  const addr = order.shipmentAddress;
  const fs = settings.fontSize;
  const labelW = Number(settings.labelWidth);
  return (
    <div style={{
      width:`${labelW}mm`, minHeight:`${settings.labelHeight}mm`,
      fontFamily:settings.fontFamily, fontSize:`${fs}pt`,
      background:"#fff", color:"#000", padding:"2mm",
      boxSizing:"border-box", lineHeight:1.35, border:"1px solid #ccc"
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1.5px solid #000",paddingBottom:"2mm",marginBottom:"2.5mm"}}>
        <div style={{maxWidth:"55%"}}>
          {logoDataUrl
            ? <img src={logoDataUrl} alt="logo" style={{maxHeight:"12mm",maxWidth:"45mm",objectFit:"contain",display:"block"}}/>
            : <div style={{fontWeight:"bold",fontSize:`${fs+2}pt`}}>{settings.storeName||"LOGO"}</div>
          }
        </div>
        <div style={{textAlign:"right",fontSize:`${fs+1}pt`,fontWeight:"bold"}}>{order.cargoProviderName}</div>
      </div>
      <div style={{marginBottom:"2.5mm"}}>
        <div style={{fontSize:`${fs-2}pt`,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>ALICI</div>
        <div style={{fontWeight:"bold",fontSize:`${fs+5}pt`,lineHeight:1.15}}>{addr.firstName} {addr.lastName}</div>
        <div style={{fontSize:`${fs}pt`,marginTop:"0.5mm"}}>{addr.address1}</div>
        <div style={{fontSize:`${fs}pt`}}>{addr.district} / {addr.city} {addr.postalCode}</div>
      </div>
      {settings.showProducts && order.lines.length > 0 && (
        <div style={{borderTop:"1px dashed #bbb",borderBottom:"1px dashed #bbb",padding:"1.5mm 0",marginBottom:"2.5mm",fontSize:`${fs-1}pt`}}>
          <div style={{fontSize:`${fs-2}pt`,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>ÜRÜNLER</div>
          {order.lines.slice(0,4).map((l,i)=>(
            <div key={i} style={{marginTop:"0.5mm"}}>
              {l.quantity}x {l.productName}
              {l.barcode ? <span style={{color:"#555",marginLeft:"2mm",fontSize:`${fs-2}pt`}}>[{l.barcode}]</span> : null}
            </div>
          ))}
          {order.lines.length > 4 && <div style={{marginTop:"0.5mm",color:"#888",fontStyle:"italic"}}>+ {order.lines.length - 4} ürün daha</div>}
        </div>
      )}
      <div style={{textAlign:"center",marginTop:"1mm"}}>
        <BarcodeImg value={order.cargoTrackingNumber} height={55}/>
        <div style={{fontFamily:"monospace",fontSize:`${fs+1}pt`,letterSpacing:"1.5px",marginTop:"1mm"}}>
          {order.cargoTrackingNumber}
        </div>
      </div>
    </div>
  );
}

/* ===================== KARGO TABLOSU ===================== */

function formatRemainingTime(estimatedDeliveryDate) {
  if (!estimatedDeliveryDate) return null;
  const now = new Date();
  const target = new Date(estimatedDeliveryDate);
  const diffMs = target - now;
  if (diffMs <= 0) return { text: "Süresi Geçti", urgent: true };
  const hours = Math.floor(diffMs / 3600000);
  const mins = Math.floor((diffMs % 3600000) / 60000);
  if (hours >= 24) {
    const days = Math.floor(hours / 24);
    return { text: `${days} gün ${hours % 24} saat`, urgent: days < 1 };
  }
  return { text: `${hours} saat ${mins} dakika`, urgent: hours < 6 };
}

function formatOrderDate(dateMs) {
  if (!dateMs) return "";
  const d = new Date(dateMs - (3 * 60 * 60 * 1000));
  return d.toLocaleString("tr-TR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" });
}

function CargoProviderDisplay({ name }) {
  if (!name) return null;
  const lower = (name || "").toLowerCase();
  if (lower.includes("trendyol")) {
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          <span style={{color:"#F27A1A",fontWeight:900,fontSize:13,letterSpacing:"-0.5px"}}>trendyol</span>
          <span style={{background:"#F27A1A",color:"#FFF",fontWeight:800,fontSize:9,padding:"1px 5px",borderRadius:3,letterSpacing:"0.5px"}}>express</span>
        </div>
      </div>
    );
  }
  // Karanlık tema uyumlu kargo firma renkleri
  if (lower.includes("aras")) return <span style={{fontWeight:700,fontSize:13,color:"#ff6b6b"}}>ARAS KARGO</span>;
  if (lower.includes("yurtiçi")) return <span style={{fontWeight:700,fontSize:13,color:"#74b9ff"}}>YURTİÇİ</span>;
  if (lower.includes("mng")) return <span style={{fontWeight:700,fontSize:13,color:"#FF9838"}}>MNG KARGO</span>;
  if (lower.includes("sürat")) return <span style={{fontWeight:700,fontSize:13,color:"#4facfe"}}>SÜRAT</span>;
  if (lower.includes("ups")) return <span style={{fontWeight:700,fontSize:13,color:"#2ed573"}}>UPS</span>;
  if (lower.includes("ptt")) return <span style={{fontWeight:700,fontSize:13,color:"#eccc68"}}>PTT KARGO</span>;
  return <span style={{fontWeight:700,fontSize:13,color:"#FFFFFF"}}>{name}</span>;
}

function ProductRow({ line, isFirst }) {
  const [imgError, setImgError] = useState(false);
  const [enlarged, setEnlarged] = useState(false);
  const imageUrl = line.productImage || line.images?.[0]?.url || line.imageUrl ||
  (line.contentId ? `https://cdn.dsmcdn.com/ty${Math.floor(line.contentId/1000000)}/product/media/images/prod/PGW/${line.contentId}/images/alternative_0.jpg` : null);
  return (
    <div style={{display:"flex",gap:10,alignItems:"flex-start",paddingTop:isFirst?"0":"10px",marginTop:isFirst?"0":"10px",borderTop:isFirst?"none":"1px dashed #38404B"}}>
      <div style={{flexShrink:0,position:"relative"}}>
        {imageUrl && !imgError
          ? <img src={imageUrl} alt={line.productName} className="product-img" onError={() => setImgError(true)} onClick={() => setEnlarged(true)} style={{cursor:"zoom-in"}}/>
          : <div className="product-img-placeholder">📦</div>
        }
        {enlarged && (
          <div style={{position:"fixed",top:0,left:0,width:"100vw",height:"100vh",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.7)"}} onClick={() => setEnlarged(false)}>
            <div style={{position:"relative"}} onClick={e => e.stopPropagation()}>
              <img src={imageUrl} alt={line.productName} style={{width:250,height:250,objectFit:"cover",borderRadius:10,border:"2px solid #38404B",display:"block"}}/>
              <button onClick={() => setEnlarged(false)} style={{position:"absolute",top:-10,right:-10,width:24,height:24,borderRadius:"50%",border:"none",background:"#F27A1A",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          </div>
        )}
      </div>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:4}}>
          <span className="quantity-badge">{line.quantity || 1}</span>
          <a href="#" className="product-name-link" title={line.productName}>{line.productName}</a>
        </div>
        <div className="product-detail">
          {line.merchantSku && <div>Stok Kodu: <span>{line.merchantSku}</span></div>}
          {(line.productColor || line.attributes?.find(a=>a.name==="Renk")?.value) &&
            <div>Renk: <span>{line.productColor || line.attributes?.find(a=>a.name==="Renk")?.value}</span></div>
          }
          {(line.barcode || line.productBarcode) &&
            <div>Barkod: <span style={{fontFamily:"monospace"}}>{line.barcode || line.productBarcode}</span></div>
          }
          {(line.productSize || line.attributes?.find(a=>a.name==="Beden")?.value) &&
            <div>Beden: <span>{line.productSize || line.attributes?.find(a=>a.name==="Beden")?.value || "Tek Ebat"}</span></div>
          }
        </div>
      </div>
    </div>
  );
}

function KargoTable({ orders, loading, error }) {
  const [search, setSearch] = useState("");
  const [cargoFilter, setCargoFilter] = useState("Tümü");

  const cargoProviders = ["Tümü", ...new Set(orders.map(o => o.cargoProviderName).filter(Boolean))];

  const filtered = orders.filter(o => {
    const q = search.toLowerCase();
    const addr = o.shipmentAddress || {};
    const matchSearch = !q ||
      (addr.firstName + " " + addr.lastName).toLowerCase().includes(q) ||
      (o.orderNumber || "").toLowerCase().includes(q) ||
      (o.lines || []).some(l => (l.productName || "").toLowerCase().includes(q));
    const matchCargo = cargoFilter === "Tümü" || o.cargoProviderName === cargoFilter;
    return matchSearch && matchCargo;
  });

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:300,flexDirection:"column",gap:16,background:"#262B35"}}>
      <div style={{width:40,height:40,border:"3px solid #38404B",borderTopColor:"#F27A1A",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}></div>
      <div style={{color:"#A0AAB5",fontSize:13}}>Kargo aşamasındaki siparişler yükleniyor...</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if (error) return (
    <div style={{padding:24,margin:16,background:"rgba(248, 113, 113, 0.1)",border:"1px solid #f87171",borderRadius:8,color:"#f87171",fontSize:13,whiteSpace:"pre-wrap"}}>{error}</div>
  );

  if (!orders.length) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:300,flexDirection:"column",gap:12,background:"#262B35"}}>
      <div style={{fontSize:48}}>🚚</div>
      <div style={{color:"#A0AAB5",fontSize:14}}>Kargo aşamasında sipariş bulunamadı</div>
    </div>
  );

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"12px 20px",background:"#1A1D24",borderBottom:"1px solid #38404B",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <input
          className="search-input-kargo"
          placeholder="🔍 Müşteri, sipariş no veya ürün ara..."
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#A0AAB5",marginRight:4}}>Kargo:</span>
          {cargoProviders.map(c => (
            <button key={c} className={`filter-btn${cargoFilter===c?" active":""}`} onClick={() => setCargoFilter(c)}>{c}</button>
          ))}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:16,alignItems:"center"}}>
          <div style={{fontSize:12,color:"#A0AAB5"}}>
            <span style={{color:"#FFFFFF",fontWeight:600}}>{filtered.length}</span> / {orders.length} sipariş
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",overflowX:"auto",background:"#1E2229"}}>
        <table className="kargo-table" style={{minWidth:750}}>
          <thead style={{position:"sticky",top:0,zIndex:10}}>
            <tr>
              <th style={{minWidth:160}}>Sipariş Bilgileri <span className="th-filter-icon">▼</span></th>
              <th style={{minWidth:110}}>Alıcı</th>
              <th style={{minWidth:350}}>Bilgiler</th>
              <th style={{minWidth:130}}>Kargo <span className="th-filter-icon">▼</span></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(order => {
              const addr = order.shipmentAddress || {};
              const lines = order.lines || [];
              const remaining = formatRemainingTime(order.estimatedDeliveryDate || order.agreedDeliveryDate);
              return (
                <tr key={order.shipmentPackageId}>
                  <td style={{verticalAlign:"top"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                      <span style={{fontSize:16}}>🛍️</span>
                      <span className="order-number">#{order.orderNumber || order.shipmentPackageId}</span>
                    </div>
                    {order.orderDate && <div style={{fontSize:11,color:"#A0AAB5",marginBottom:2}}>Sipariş Tarihi: {formatOrderDate(order.orderDate)}</div>}
                    {order.shipmentPackageId && <div style={{fontSize:11,color:"#A0AAB5",marginBottom:2}}>Paket No: {order.shipmentPackageId}</div>}
                    {order.cargoTrackingNumber && <div style={{fontSize:11,color:"#A0AAB5",marginBottom:4}}>Teslimat No: {order.cargoTrackingNumber}</div>}
                    {remaining && (
                      <div className={`kalan-sure${remaining.urgent?" urgent":""}`}>
                        Kalan Süre:<br/>{remaining.text}
                      </div>
                    )}
                  </td>
                  <td style={{verticalAlign:"top"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                      <span style={{color:"#f59e0b",fontSize:14}}>★</span>
                      <span style={{fontWeight:600,fontSize:13,color:"#FFFFFF"}}>{addr.firstName} {addr.lastName}</span>
                    </div>
                    {addr.city && <div style={{fontSize:11,color:"#A0AAB5"}}>{addr.district && addr.district + ", "}{addr.city}</div>}
                  </td>
                  <td style={{verticalAlign:"top"}}>
                    {lines.map((line, i) => (
                      <ProductRow key={i} line={line} isFirst={i === 0} />
                    ))}
                  </td>
                  <td style={{verticalAlign:"top"}}>
                    <CargoProviderDisplay name={order.cargoProviderName} />
                    {order.cargoTrackingNumber && (
                      <div className="tracking-no">{order.cargoTrackingNumber}</div>
                    )}
                    <div className="cargo-sub">Trendyol anlaşmalı kargo</div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ===================== ANA UYGULAMA ===================== */

function App() {
  const [tab, setTab] = useState("orders");
  const [envLoaded, setEnvLoaded] = useState(false);

  const [orders, setOrders] = useState([]);
  const [selectedOrders, setSelectedOrders] = useState([]);
  const [printedOrders, setPrintedOrders] = useState([]);
  const [printedLoading, setPrintedLoading] = useState(true);

  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [currentPreview, setCurrentPreview] = useState(null);
  const [search, setSearch] = useState("");
  const [cargoFilter, setCargoFilter] = useState("Tümü");
  const [printFilter, setPrintFilter] = useState("Tümü");
  const [logoDataUrl, setLogoDataUrl] = useState("/text-1773078104872.png");
  const logoInputRef = useRef();
  const [settings, setSettings] = useState({
    labelWidth:100, labelHeight:100,
    fontFamily:"Arial, sans-serif", fontSize:8,
    storeName:"Mağaza Adım", showProducts:true,
  });

  useEffect(() => {
    loadPrintedFromServer().then(ids => {
      setPrintedOrders(ids);
      setPrintedLoading(false);
    });
  }, []);

  const handleLogoUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setLogoDataUrl(ev.target.result);
    reader.readAsDataURL(file);
  };

  const fetchOrdersFromServer = async () => {
    setLoading(true); setError("");
    try {
      const allOrders = [];
      let page = 0;
      let totalPages = 1;
      while (page < totalPages) {
        const res = await fetch(`/api/orders?status=Created&size=200&page=${page}`);
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data.error||data));
        const list = data.content || [];
        const mapped = list.map(o => ({
          ...o,
          lines: (o.lines||[]).map(l => ({ ...l, barcode: l.barcode||l.productBarcode||"" }))
        }));
        allOrders.push(...mapped);
        totalPages = data.totalPages || 1;
        page++;
      }
      const sorted = sortOrders(allOrders);
      setOrders(sorted);
      if (sorted.length === 0) setError("Bekleyen sipariş bulunamadı.");
    } catch(e) { setError("Hata: " + e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => {
    fetch("/api/config")
      .then(r => r.json())
      .then(data => {
        if (data.hasConfig) {
          setEnvLoaded(true);
          fetchOrdersFromServer();
        }
      })
      .catch(() => {});
  }, []);

  const toggleSelect = (id) => setSelectedOrders(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);

  const togglePrinted = async (id, e) => {
    e.stopPropagation();
    if (!window.confirm("Bu siparişin yazdırıldı işareti kaldırılsın mı?")) return;
    const updated = printedOrders.filter(x => x !== id);
    setPrintedOrders(updated);
    await removePrintedFromServer(id);
  };

  const getOrderIndex = (order) => orders.indexOf(order) + 1;

  const handlePrint = async () => {
    const toPrint = orders.filter(o => selectedOrders.includes(o.shipmentPackageId));
    if (!toPrint.length) { alert("Lütfen en az bir sipariş seçin!"); return; }
    const printArea = document.getElementById("print-area");
    printArea.innerHTML = "";
    const fs = settings.fontSize;
    const labelW = Number(settings.labelWidth);

    toPrint.forEach(order => {
      const addr = order.shipmentAddress;
      const logoHtml = logoDataUrl
        ? `<img src="${logoDataUrl}" style="max-height:12mm;max-width:45mm;object-fit:contain;display:block"/>`
        : `<div style="font-weight:bold;font-size:${fs+2}pt">${settings.storeName||"LOGO"}</div>`;
      const productsHtml = settings.showProducts && order.lines.length > 0 ? `
        <div style="border-top:1px dashed #bbb;border-bottom:1px dashed #bbb;padding:1.5mm 0;margin-bottom:2.5mm;font-size:${fs-1}pt">
          <div style="font-size:${fs-2}pt;color:#888;text-transform:uppercase;letter-spacing:0.5px">ÜRÜNLER</div>
          ${order.lines.slice(0,4).map(l=>`<div style="margin-top:0.5mm">${l.quantity}x ${l.productName}${l.barcode?` <span style="color:#555;font-size:${fs-2}pt">[${l.barcode}]</span>`:""}</div>`).join("")}
          ${order.lines.length > 4 ? `<div style="margin-top:0.5mm;color:#888;font-style:italic">+ ${order.lines.length - 4} ürün daha</div>` : ""}
        </div>` : "";
      const div = document.createElement("div");
      div.style.cssText = `width:${labelW}mm;min-height:${settings.labelHeight}mm;font-family:${settings.fontFamily};font-size:${fs}pt;background:#fff;color:#000;padding:2mm;box-sizing:border-box;line-height:1.35;`;
      div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid #000;padding-bottom:2mm;margin-bottom:2.5mm">
          <div style="max-width:55%">${logoHtml}</div>
          <div style="text-align:right;font-size:${fs+1}pt;font-weight:bold">${order.cargoProviderName}</div>
        </div>
        <div style="margin-bottom:2.5mm">
          <div style="font-size:${fs-2}pt;color:#888;text-transform:uppercase;letter-spacing:0.5px">ALICI</div>
          <div style="font-weight:bold;font-size:${fs+5}pt;line-height:1.15">${addr.firstName} ${addr.lastName}</div>
          <div style="font-size:${fs}pt;margin-top:0.5mm">${addr.address1}</div>
          <div style="font-size:${fs}pt">${addr.district} / ${addr.city} ${addr.postalCode}</div>
        </div>
        ${productsHtml}
        <div style="text-align:center;margin-top:1mm">
            ${generateBarcodeSVG(order.cargoTrackingNumber, 55)}
            <div style="font-family:monospace;font-size:${fs+1}pt;letter-spacing:1.5px;margin-top:1mm">${order.cargoTrackingNumber}</div>
          </div>`;
      printArea.appendChild(div);
    });

    document.getElementById("app").style.display = "none";
    setTimeout(async () => {
      window.print();
      document.getElementById("app").style.display = "block";
      printArea.innerHTML = "";
      const newPrinted = [...new Set([...printedOrders, ...toPrint.map(o => o.shipmentPackageId)])];
      setPrintedOrders(newPrinted);
      await savePrintedToServer(newPrinted);
    }, 100);
  };

  const handleClearPrinted = async () => {
    if (window.confirm("Tüm siparişlerin yazdırıldı işareti kaldırılsın mı?")) {
      setPrintedOrders([]);
      await savePrintedToServer([]);
    }
  };

  const btn = (label, t) => (
    <button onClick={()=>setTab(t)} style={{
      padding:"6px 14px", borderRadius:6, border:"none", cursor:"pointer", fontSize:12, fontWeight:600,
      background:tab===t?"#F27A1A":"#38404B", color:tab===t?"#FFFFFF":"#A0AAB5",
      transition: "background 0.2s"
    }} onMouseEnter={(e) => { if(tab!==t) e.target.style.background = "#626D7A"; }}
       onMouseLeave={(e) => { if(tab!==t) e.target.style.background = "#38404B"; }}>
      {label}
    </button>
  );

  const filtered = orders.filter(o => {
    const q = search.toLowerCase();
    const matchSearch = !q ||
      (o.shipmentAddress.firstName+" "+o.shipmentAddress.lastName).toLowerCase().includes(q) ||
      (o.orderNumber||"").toLowerCase().includes(q);
    const matchCargo = cargoFilter==="Tümü" || o.cargoProviderName===cargoFilter;
    const isPrinted = printedOrders.includes(o.shipmentPackageId);
    const matchPrint = printFilter==="Tümü" || (printFilter==="Yazdırıldı" && isPrinted) || (printFilter==="Yazdırılmadı" && !isPrinted);
    return matchSearch && matchCargo && matchPrint;
  });

  const printedCount = orders.filter(o => printedOrders.includes(o.shipmentPackageId)).length;
  const notPrintedCount = orders.length - printedCount;

  const allFilteredSelected = filtered.length > 0 && filtered.every(o => selectedOrders.includes(o.shipmentPackageId));
  const handleSelectAll = () => {
    if (allFilteredSelected) {
      setSelectedOrders(prev => prev.filter(id => !filtered.map(o => o.shipmentPackageId).includes(id)));
    } else {
      setSelectedOrders(prev => [...new Set([...prev, ...filtered.map(o => o.shipmentPackageId)])]);
    }
  };

  return (
    <div style={{minHeight:"100vh",background:"#1E2229",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:"#262B35",borderBottom:"1px solid #38404B",padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style={{fontWeight:700,fontSize:15,letterSpacing:"0.5px",color:"#FFFFFF"}}>TRENDYOL KARGO ETİKETİ PANELİ</div>
        <div style={{display:"flex",gap:8}}>
          {btn("📦 Siparişler","orders")}
          {btn("🖨️ Yazdır","print")}
          <button onClick={()=>setTab("kargo")} style={{
            padding:"8px 18px", borderRadius:6, border:"none", cursor:"pointer", fontSize:14, fontWeight:600,
            background:tab==="kargo"?"#F27A1A":"#38404B", color:tab==="kargo"?"#FFFFFF":"#A0AAB5",
            display:"flex", alignItems:"center", gap:6, transition: "background 0.2s"
          }}
          onMouseEnter={(e) => { if(tab!=="kargo") e.target.style.background = "#626D7A"; }}
          onMouseLeave={(e) => { if(tab!=="kargo") e.target.style.background = "#38404B"; }}>
            🚚 Kargo Aşamasındakiler
            {orders.length > 0 && (
              <span style={{background:"rgba(255,255,255,0.25)",borderRadius:10,padding:"2px 9px",fontSize:13,fontWeight:700,color:"#FFF"}}>
                {orders.length}
              </span>
            )}
          </button>
        </div>
      </div>

      {/* Kargo Aşamasındakiler */}
      {tab === "kargo" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{background:"#1A1D24",borderBottom:"1px solid #38404B",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>🚚</span>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:"#FFFFFF"}}>Kargo Aşamasındaki Siparişler</div>
                <div style={{fontSize:11,color:"#A0AAB5",marginTop:1}}>Yeni (Created) statüsündeki siparişler</div>
              </div>
            </div>
            <button className="btn-primary" onClick={fetchOrdersFromServer} disabled={loading} style={{
              padding:"7px 16px",borderRadius:6,border:"none",cursor:"pointer",
              background:loading?"#38404B":"#F27A1A",color:"#fff",fontWeight:600,fontSize:12,
              display:"flex",alignItems:"center",gap:6
            }}>
              {loading ? "⏳ Yükleniyor..." : "🔄 Yenile"}
            </button>
          </div>
          {error && orders.length === 0 ? (
            <div style={{padding:24,margin:16,background:"rgba(248, 113, 113, 0.1)",border:"1px solid #f87171",borderRadius:8,color:"#f87171",fontSize:13}}>{error}</div>
          ) : (
            <KargoTable orders={orders} loading={loading} error={""} />
          )}
        </div>
      )}

      {/* Siparişler + Yazdır */}
      {(tab === "orders" || tab === "print") && (
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          <div style={{width:380,background:"#1A1D24",borderRight:"1px solid #38404B",overflowY:"auto",flexShrink:0}}>

            {tab==="orders" && (
              <div style={{padding:16,borderBottom:"1px solid #38404B"}}>
                {envLoaded
                  ? <div style={{padding:"6px 10px",background:"rgba(74, 222, 128, 0.1)",border:"1px solid rgba(74, 222, 128, 0.3)",borderRadius:6,fontSize:11,color:"#4ade80",marginBottom:8}}>✅ API bilgileri sunucudan yüklendi</div>
                  : <div style={{padding:"6px 10px",background:"rgba(248, 113, 113, 0.1)",border:"1px solid rgba(248, 113, 113, 0.3)",borderRadius:6,fontSize:11,color:"#f87171",marginBottom:8}}>⚠️ API bilgileri yüklenemedi</div>
                }
                {printedLoading && (
                  <div style={{padding:"6px 10px",background:"#262B35",borderRadius:6,fontSize:11,color:"#A0AAB5",marginBottom:8}}>
                    ⏳ Yazdırma geçmişi yükleniyor...
                  </div>
                )}
                <button className="btn-primary" onClick={fetchOrdersFromServer} disabled={loading} style={{
                  width:"100%",padding:"8px",borderRadius:6,border:"none",cursor:"pointer",
                  background:loading?"#38404B":"#F27A1A",color:"#FFFFFF",fontWeight:600,fontSize:12
                }}>{loading?"Yükleniyor...":"🔄 Siparişleri Getir"}</button>
                {error && <div style={{marginTop:8,padding:"8px 10px",background:"rgba(248, 113, 113, 0.1)",borderRadius:6,color:"#f87171",fontSize:12,whiteSpace:"pre-wrap"}}>{error}</div>}
              </div>
            )}

            {tab==="orders" && (
              <div style={{padding:"12px 16px"}}>
                <input type="text" placeholder="🔍 Müşteri adı veya sipariş no..." value={search}
                  onChange={e=>setSearch(e.target.value)} style={{marginBottom:8}}/>

                <div style={{fontSize:10,color:"#626D7A",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>Kargo Firması</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
                  {["Tümü", ...new Set(orders.map(o=>o.cargoProviderName))].map(cargo=>(
                    <button key={cargo} onClick={()=>setCargoFilter(cargo)} style={{
                      padding:"3px 8px",borderRadius:4,border:"1px solid",cursor:"pointer",fontSize:10,fontWeight:600,
                      borderColor:cargoFilter===cargo?"#F27A1A":"#38404B",
                      background:cargoFilter===cargo?"#F27A1A":"#262B35",
                      color:cargoFilter===cargo?"#FFFFFF":"#A0AAB5",
                      transition: "all 0.2s"
                    }}>{cargo}</button>
                  ))}
                </div>

                <div style={{fontSize:10,color:"#626D7A",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>Baskı Durumu</div>
                <div style={{display:"flex",gap:4,marginBottom:10}}>
                  {[
                    {label:"Tümü", value:"Tümü"},
                    {label:`Yazdırılmadı (${notPrintedCount})`, value:"Yazdırılmadı"},
                    {label:`Yazdırıldı (${printedCount})`, value:"Yazdırıldı"},
                  ].map(opt=>(
                    <button key={opt.value} onClick={()=>setPrintFilter(opt.value)} style={{
                      padding:"3px 8px",borderRadius:4,border:"1px solid",cursor:"pointer",fontSize:10,fontWeight:600,
                      borderColor:printFilter===opt.value?"#F27A1A":"#38404B",
                      background:printFilter===opt.value?"#F27A1A":"#262B35",
                      color:printFilter===opt.value?"#FFFFFF":"#A0AAB5",
                      transition: "all 0.2s"
                    }}>{opt.label}</button>
                  ))}
                </div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:11,color:"#A0AAB5",textTransform:"uppercase"}}>{filtered.length} / {orders.length} Sipariş</div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <button onClick={handleSelectAll}
                      style={{fontSize:11,color:allFilteredSelected?"#FF9838":"#F27A1A",background:"none",border:"none",cursor:"pointer"}}>
                      {allFilteredSelected ? "Seçimi Kaldır" : "Tümünü Seç"}
                    </button>
                    {printedOrders.length > 0 && (
                      <button onClick={handleClearPrinted}
                        style={{fontSize:11,color:"#A0AAB5",background:"none",border:"none",cursor:"pointer"}}>
                        🗑️ İşareti kaldır
                      </button>
                    )}
                  </div>
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {filtered.map(order => {
                    const sel = selectedOrders.includes(order.shipmentPackageId);
                    const printed = printedOrders.includes(order.shipmentPackageId);
                    return (
                      <div key={order.shipmentPackageId}
                        onClick={()=>{ toggleSelect(order.shipmentPackageId); setCurrentPreview(order); }}
                        style={{padding:"10px 12px",borderRadius:8,cursor:"pointer",
                          background:sel?"rgba(242, 122, 26, 0.1)":printed?"#1A1D24":"#262B35",
                          border:`1px solid ${sel?"#FF9838":printed?"#38404B":"#38404B"}`,
                          opacity:printed?0.7:1,
                          transition:"border-color 0.2s, background 0.2s"}}>
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <div>
                            <div style={{fontWeight:600,fontSize:13,color:"#FFFFFF"}}>{order.shipmentAddress.firstName} {order.shipmentAddress.lastName}</div>
                            <div style={{fontSize:11,color:"#A0AAB5",marginTop:2}}>{order.orderNumber}</div>
                            <div style={{fontSize:11,color:"#A0AAB5",marginTop:2}}>{order.shipmentAddress.district}, {order.shipmentAddress.city}</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"#1A1D24",border:"1px solid #38404B",color:"#F27A1A",fontWeight:600}}>{order.cargoProviderName}</span>
                            <div style={{fontSize:11,color:"#A0AAB5",marginTop:4}}>{order.lines.length} ürün</div>
                          </div>
                        </div>
                        <div style={{marginTop:4,display:"flex",gap:6,alignItems:"center"}}>
                          {sel && <span style={{fontSize:10,color:"#FF9838",fontWeight:600}}>✓ Seçildi</span>}
                          {printed && (
                            <span
                              onClick={(e) => togglePrinted(order.shipmentPackageId, e)}
                              title="Yazdırıldı işaretini kaldır"
                              style={{fontSize:10,color:"#A0AAB5",fontWeight:600,cursor:"pointer",
                                borderBottom:"1px dashed #A0AAB5",lineHeight:1.2}}>
                              🖨️ Yazdırıldı işaretini kaldır
                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {tab==="print" && (
              <div style={{padding:16}}>
                <div style={{padding:12,background:"#262B35",borderRadius:8,border:"1px solid #38404B",marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#FFFFFF"}}>{selectedOrders.length} etiket seçildi</div>
                  <div style={{fontSize:11,color:"#A0AAB5",marginTop:4}}>Boyut: {settings.labelWidth}×{settings.labelHeight}mm</div>
                </div>
                <button className="btn-primary" onClick={handlePrint} style={{
                  width:"100%",padding:12,borderRadius:8,border:"none",cursor:"pointer",
                  background:selectedOrders.length?"#F27A1A":"#38404B",color:"#FFFFFF",fontWeight:700,fontSize:14,marginBottom:12
                }}>🖨️ Yazdır</button>
                <div style={{fontSize:11,color:"#626D7A",lineHeight:1.8,marginBottom:16}}>
                  <strong style={{color:"#A0AAB5"}}>Termal yazıcı için:</strong><br/>
                  Sayfa boyutu: <strong style={{color:"#A0AAB5"}}>özel → {settings.labelWidth}×{settings.labelHeight}mm</strong><br/>
                  Kenar boşlukları: <strong style={{color:"#A0AAB5"}}>sıfır</strong>
                </div>

                <div style={{borderTop:"1px solid #38404B",paddingTop:14,marginBottom:8}}>
                  <div style={{fontSize:11,color:"#A0AAB5",textTransform:"uppercase",letterSpacing:"1px",marginBottom:12}}>⚙️ Etiket Şablonu</div>
                  <div style={{display:"grid",gap:10}}>
                    <div>
                      <div style={{fontSize:11,color:"#A0AAB5",marginBottom:6}}>Mağaza Logosu</div>
                      <input ref={logoInputRef} type="file" accept="image/*" onChange={handleLogoUpload} style={{display:"none"}}/>
                      <button onClick={()=>logoInputRef.current.click()} style={{
                        width:"100%",padding:"8px",borderRadius:6,border:"1px dashed #38404B",
                        background:"#1A1D24",color:"#A0AAB5",cursor:"pointer",fontSize:12, transition:"background 0.2s"
                      }} onMouseEnter={(e)=>e.target.style.background="#262B35"} onMouseLeave={(e)=>e.target.style.background="#1A1D24"}>
                        {logoDataUrl?"✅ Logo yüklendi — değiştir":"📁 Logo dosyası seç"}
                      </button>
                      {logoDataUrl && (
                        <div style={{marginTop:8,textAlign:"center",background:"#1A1D24",borderRadius:6,padding:8, border:"1px solid #38404B"}}>
                          <img src={logoDataUrl} alt="önizleme" style={{maxHeight:40,maxWidth:"100%",objectFit:"contain"}}/>
                        </div>
                      )}
                    </div>
                    {[
                      ["storeName","Yedek Mağaza Adı (logo yoksa)","text"],
                      ["labelWidth","Etiket Genişliği (mm)","number"],
                      ["labelHeight","Etiket Yüksekliği (mm)","number"],
                      ["fontSize","Yazı Boyutu (pt)","number"],
                    ].map(([key,label,type])=>(
                      <div key={key}>
                        <div style={{fontSize:11,color:"#A0AAB5",marginBottom:4}}>{label}</div>
                        <input type={type} value={settings[key]}
                          onChange={e=>setSettings(p=>({...p,[key]:type==="number"?Number(e.target.value):e.target.value}))}/>
                      </div>
                    ))}
                    <label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#A0AAB5",cursor:"pointer"}}>
                      <input type="checkbox" checked={settings.showProducts} onChange={e=>setSettings(p=>({...p,showProducts:e.target.checked}))}/>
                      Ürün listesini göster
                    </label>
                  </div>
                </div>

                {printedOrders.length > 0 && (
                  <div style={{marginTop:16,padding:"10px 12px",background:"#1A1D24",borderRadius:8,border:"1px solid #38404B"}}>
                    <div style={{fontSize:12,color:"#A0AAB5",fontWeight:600}}>🖨️ {printedOrders.length} sipariş yazdırıldı</div>
                    <div style={{fontSize:11,color:"#626D7A",marginTop:4}}>Bu bilgi sunucuda kalıcı olarak saklanır.</div>
                    <button onClick={handleClearPrinted} style={{
                      marginTop:8,padding:"5px 10px",borderRadius:5,border:"1px solid #38404B",
                      background:"#262B35",color:"#A0AAB5",cursor:"pointer",fontSize:11, transition:"background 0.2s"
                    }} onMouseEnter={(e)=>e.target.style.background="#38404B"} onMouseLeave={(e)=>e.target.style.background="#262B35"}>
                      Yazdırıldı işaretini kaldır
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Etiket Önizleme */}
          <div style={{flex:1,overflowY:"auto",background:"#1E2229",display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 24px"}}>
            <div style={{fontSize:11,color:"#626D7A",textTransform:"uppercase",letterSpacing:"1px",marginBottom:20}}>
              {currentPreview?"Etiket Önizleme":"Bir sipariş seçin"}
            </div>
            {currentPreview
              ? <div style={{boxShadow:"0 8px 40px rgba(0,0,0,0.6)"}}>
                  <LabelHTML
                    order={currentPreview}
                    settings={settings}
                    logoDataUrl={logoDataUrl}
                    orderIndex={getOrderIndex(currentPreview)}
                  />
                </div>
              : <div style={{textAlign:"center",color:"#626D7A",marginTop:60}}><div style={{fontSize:48}}>📦</div><div style={{marginTop:12,fontSize:14}}>Önizleme için siparişe tıklayın</div></div>
            }
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
