<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trendyol Kargo Etiketi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-base: #1a1a2e;
      --bg-surface: #16213e;
      --bg-card: #0f3460;
      --bg-elevated: #1e2a4a;
      --bg-input: #12192b;
      --accent: #f27a1a;
      --accent-hover: #e06d10;
      --accent-subtle: rgba(242,122,26,0.12);
      --border: rgba(255,255,255,0.07);
      --border-active: rgba(242,122,26,0.5);
      --text-primary: #f0f4ff;
      --text-secondary: #8892a4;
      --text-muted: #556070;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --purple: #818cf8;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* Nav */
    .nav {
      height: 56px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 24px;
      flex-shrink: 0;
    }
    .nav-brand {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      margin-right: 8px;
    }
    .nav-tabs {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .nav-tab {
      padding: 6px 16px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.15s;
      position: relative;
    }
    .nav-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .nav-tab.active {
      color: var(--accent);
      background: var(--accent-subtle);
    }
    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 16px;
      right: 16px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    /* Layout */
    .layout {
      display: flex;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* Left Panel */
    .left-panel {
      width: 360px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Search & Filters */
    .search-box {
      position: relative;
      margin-bottom: 10px;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
    }
    .search-input {
      width: 100%;
      padding: 8px 10px 8px 32px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .filter-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .filter-select {
      flex: 1;
      padding: 6px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
    }
    .filter-select:focus { border-color: var(--accent); }

    .filter-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .chip {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.active-printed { background: var(--purple); border-color: var(--purple); color: #fff; }
    .chip.active-notprinted { background: var(--success); border-color: var(--success); color: #fff; }

    /* Order List */
    .order-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .order-card {
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .order-card:hover { border-color: rgba(242,122,26,0.3); background: rgba(242,122,26,0.04); }
    .order-card.selected { border-color: var(--accent); background: rgba(242,122,26,0.08); }
    .order-card.printed { border-color: rgba(129,140,248,0.4); background: rgba(129,140,248,0.06); opacity: 0.8; }

    .order-card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .order-checkbox {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.15s;
    }
    .order-checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .order-checkbox.checked::after {
      content: '✓';
      font-size: 10px;
      color: #fff;
      font-weight: 700;
    }
    .order-info { flex: 1; min-width: 0; }
    .order-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .order-meta {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }
    .order-location { font-size: 11px; color: var(--text-muted); }
    .order-card-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .cargo-logo-placeholder {
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .cargo-name-small { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
    .product-count-badge {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-muted);
    }
    .printed-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 20px;
      background: rgba(129,140,248,0.15);
      color: var(--purple);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      margin-left: auto;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .printed-badge:hover { border-color: var(--purple); background: rgba(129,140,248,0.25); }

    /* Right Panel */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-base);
    }

    /* Orders tab right */
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 32px;
      gap: 16px;
    }
    .preview-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .preview-empty {
      text-align: center;
      color: var(--text-muted);
    }
    .preview-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .preview-empty-text { font-size: 14px; }

    /* Print tab */
    .print-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .print-settings {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .settings-section { display: flex; flex-direction: column; gap: 8px; }
    .settings-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .settings-row { display: flex; gap: 8px; }
    .settings-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .settings-field-label { font-size: 11px; color: var(--text-secondary); }
    .settings-input {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    .settings-input:focus { border-color: var(--accent); }
    .settings-input-suffix {
      position: relative;
    }
    .settings-input-suffix input { padding-right: 28px; }
    .settings-input-suffix span {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--text-muted);
    }

    .logo-upload-btn {
      width: 100%;
      padding: 8px;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border);
      background: var(--bg-input);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      text-align: left;
      transition: all 0.15s;
    }
    .logo-upload-btn:hover { border-color: var(--accent); color: var(--accent); }
    .logo-upload-btn.has-logo {
      border-style: solid;
      border-color: rgba(34,197,94,0.4);
      color: var(--success);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-label { font-size: 12px; color: var(--text-secondary); }
    .toggle {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }
    .toggle.on { background: var(--accent); border-color: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 18px; }

    .print-btn {
      width: 100%;
      padding: 10px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      background: var(--accent);
      color: #fff;
      transition: background 0.15s;
    }
    .print-btn:hover { background: var(--accent-hover); }
    .print-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    .print-preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 32px;
      background: var(--bg-base);
    }

    /* Cargo tab */
    .cargo-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .cargo-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .cargo-header-left { display: flex; flex-direction: column; gap: 2px; }
    .cargo-header-title { font-size: 14px; font-weight: 600; }
    .cargo-header-sub { font-size: 11px; color: var(--text-muted); }
    .cargo-table-wrap { flex: 1; overflow: auto; }

    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--bg-surface); position: sticky; top: 0; z-index: 5; }
    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-size: 12px;
    }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    .time-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .time-badge.urgent { background: rgba(239,68,68,0.15); color: var(--danger); }
    .time-badge.ok { background: rgba(34,197,94,0.12); color: var(--success); }
    .time-badge.warn { background: rgba(245,158,11,0.12); color: var(--warning); }

    .product-thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .product-thumb-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .cargo-provider-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--accent-subtle);
      border: 1px solid rgba(242,122,26,0.2);
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
    }

    /* Actions bar */
    .actions-bar {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .actions-bar-left { display: flex; align-items: center; gap: 12px; }
    .stat-text { font-size: 11px; color: var(--text-secondary); }
    .stat-text strong { color: var(--text-primary); font-weight: 600; }
    .link-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: var(--accent);
      padding: 0;
      transition: opacity 0.15s;
    }
    .link-btn:hover { opacity: 0.7; }
    .link-btn.danger { color: var(--danger); }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      background: var(--accent);
      color: #fff;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: var(--accent-hover); }
    .refresh-btn:disabled { background: var(--bg-elevated); color: var(--text-muted); cursor: not-allowed; }

    /* Loading spinner */
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 200px;
    }
    .loading-text { font-size: 12px; color: var(--text-muted); }

    /* Error */
    .error-box {
      margin: 12px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-sm);
      color: #f87171;
      font-size: 12px;
    }

    /* Status info bar */
    .info-bar {
      padding: 6px 16px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .info-bar.success { background: rgba(34,197,94,0.08); color: #4ade80; }
    .info-bar.warning { background: rgba(239,68,68,0.08); color: #f87171; }

    /* Printed info box */
    .printed-info {
      padding: 10px 12px;
      background: rgba(129,140,248,0.08);
      border: 1px solid rgba(129,140,248,0.2);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .printed-info-text { font-size: 12px; color: var(--purple); font-weight: 600; }
    .printed-info-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Print media */
    @media print {
      #app { display: none !important; }
      #print-area { display: block !important; }
      #print-area > div { page-break-after: always; page-break-inside: avoid; }
      #print-area > div:last-child { page-break-after: avoid !important; }
    }
    #print-area { display: none; }

    /* Label styles (unchanged) */
    .label-shadow { box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
<div id="app"></div>
<div id="print-area"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ===================== API =====================
async function loadPrintedFromServer() {
  try {
    const res = await fetch("api/printed");
    const data = await res.json();
    return data.ids || [];
  } catch (e) { return []; }
}
async function savePrintedToServer(ids) {
  try {
    await fetch("api/printed", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ids }),
    });
  } catch (e) {}
}
async function removePrintedFromServer(id) {
  try {
    await fetch(`api/printed/${id}`, { method: "DELETE" });
  } catch (e) {}
}

// ===================== HELPERS =====================
function sortOrders(list) {
  return [...list].sort((a, b) => (b.shipmentPackageId || 0) - (a.shipmentPackageId || 0));
}

function BarcodeImg({ value, height }) {
  const svgRef = useRef();
  useEffect(() => {
    if (!value || !svgRef.current) return;
    try {
      JsBarcode(svgRef.current, String(value), {
        format: "CODE128", width: 2.5, height,
        displayValue: false, margin: 0,
        background: "#ffffff", lineColor: "#000000",
      });
    } catch(e) {}
  }, [value, height]);
  return <svg ref={svgRef} style={{display:"block",margin:"0 auto",maxWidth:"100%"}}></svg>;
}

function generateBarcodeSVG(value, height) {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  try {
    JsBarcode(svg, String(value), {
      format: "CODE128", width: 2.5, height,
      displayValue: false, margin: 0,
      background: "#ffffff", lineColor: "#000000",
    });
  } catch(e) {}
  return svg.outerHTML;
}

function formatRemainingTime(estimatedDeliveryDate) {
  if (!estimatedDeliveryDate) return null;
  const now = new Date();
  const target = new Date(estimatedDeliveryDate);
  const diffMs = target - now;
  if (diffMs <= 0) return { text: "Süresi Geçti", type: "urgent" };
  const hours = Math.floor(diffMs / 3600000);
  const mins = Math.floor((diffMs % 3600000) / 60000);
  if (hours >= 24) {
    const days = Math.floor(hours / 24);
    return { text: `${days}g ${hours % 24}s`, type: days < 1 ? "warn" : "ok" };
  }
  return { text: `${hours}s ${mins}dk`, type: hours < 6 ? "urgent" : "warn" };
}

function formatOrderDate(dateMs) {
  if (!dateMs) return "";
  const d = new Date(dateMs - (3 * 60 * 60 * 1000));
  return d.toLocaleString("tr-TR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" });
}

// ===================== LABEL (unchanged template) =====================
function LabelHTML({ order, settings, logoDataUrl }) {
  const addr = order.shipmentAddress;
  const fs = settings.fontSize;
  const labelW = Number(settings.labelWidth);
  return (
    <div style={{
      width:`${labelW}mm`, minHeight:`${settings.labelHeight}mm`,
      fontFamily:settings.fontFamily, fontSize:`${fs}pt`,
      background:"#fff", color:"#000", padding:"2mm",
      boxSizing:"border-box", lineHeight:1.35, border:"1px solid #ccc"
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1.5px solid #000",paddingBottom:"2mm",marginBottom:"2.5mm"}}>
        <div style={{maxWidth:"55%"}}>
          {logoDataUrl
            ? <img src={logoDataUrl} alt="logo" style={{maxHeight:"12mm",maxWidth:"45mm",objectFit:"contain",display:"block"}}/>
            : <div style={{fontWeight:"bold",fontSize:`${fs+2}pt`}}>{settings.storeName||"LOGO"}</div>
          }
        </div>
        <div style={{textAlign:"right",fontSize:`${fs+1}pt`,fontWeight:"bold"}}>{order.cargoProviderName}</div>
      </div>
      <div style={{marginBottom:"2.5mm"}}>
        <div style={{fontSize:`${fs-2}pt`,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>ALICI</div>
        <div style={{fontWeight:"bold",fontSize:`${fs+5}pt`,lineHeight:1.15}}>{addr.firstName} {addr.lastName}</div>
        <div style={{fontSize:`${fs}pt`,marginTop:"0.5mm"}}>{addr.address1}</div>
        <div style={{fontSize:`${fs}pt`}}>{addr.district} / {addr.city} {addr.postalCode}</div>
      </div>
      {settings.showProducts && order.lines.length > 0 && (
        <div style={{borderTop:"1px dashed #bbb",borderBottom:"1px dashed #bbb",padding:"1.5mm 0",marginBottom:"2.5mm",fontSize:`${fs-1}pt`}}>
          <div style={{fontSize:`${fs-2}pt`,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>ÜRÜNLER</div>
          {order.lines.slice(0,4).map((l,i)=>(
            <div key={i} style={{marginTop:"0.5mm"}}>
              {l.quantity}x {l.productName}
              {l.barcode ? <span style={{color:"#555",marginLeft:"2mm",fontSize:`${fs-2}pt`}}>[{l.barcode}]</span> : null}
            </div>
          ))}
          {order.lines.length > 4 && <div style={{marginTop:"0.5mm",color:"#888",fontStyle:"italic"}}>+ {order.lines.length - 4} ürün daha</div>}
        </div>
      )}
      <div style={{textAlign:"center",marginTop:"1mm"}}>
        <BarcodeImg value={order.cargoTrackingNumber} height={55}/>
        <div style={{fontFamily:"monospace",fontSize:`${fs+1}pt`,letterSpacing:"1.5px",marginTop:"1mm"}}>
          {order.cargoTrackingNumber}
        </div>
      </div>
    </div>
  );
}

// ===================== CARGO TABLE =====================
function ProductCell({ line }) {
  const [imgError, setImgError] = useState(false);
  const imageUrl = line.productImage || line.images?.[0]?.url || line.imageUrl ||
    (line.contentId ? `https://cdn.dsmcdn.com/ty${Math.floor(line.contentId/1000000)}/product/media/images/prod/PGW/${line.contentId}/images/alternative_0.jpg` : null);
  return (
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      {imageUrl && !imgError
        ? <img src={imageUrl} alt="" className="product-thumb" onError={() => setImgError(true)}/>
        : <div className="product-thumb-placeholder">📦</div>
      }
      <div>
        <div style={{fontWeight:500,fontSize:12,color:"var(--text-primary)",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{line.productName}</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>
          {line.quantity > 1 && <span style={{color:"var(--accent)",fontWeight:600}}>{line.quantity}x </span>}
          {line.merchantSku && <span>{line.merchantSku}</span>}
          {line.barcode && <span style={{fontFamily:"monospace",marginLeft:6}}>{line.barcode}</span>}
        </div>
      </div>
    </div>
  );
}

function KargoTable({ orders, loading, error, onRefresh }) {
  const [search, setSearch] = useState("");
  const filtered = orders.filter(o => {
    const q = search.toLowerCase();
    if (!q) return true;
    const addr = o.shipmentAddress || {};
    return (addr.firstName + " " + addr.lastName).toLowerCase().includes(q) ||
      (o.orderNumber || "").toLowerCase().includes(q) ||
      (o.lines || []).some(l => (l.productName || "").toLowerCase().includes(q));
  });

  return (
    <div className="cargo-section">
      <div className="cargo-header">
        <div className="cargo-header-left">
          <div className="cargo-header-title">Kargo Aşamasındaki Siparişler</div>
          <div className="cargo-header-sub">Trendyol API — Created statüsü</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--text-muted)",fontSize:12}}>🔍</span>
            <input
              style={{padding:"6px 10px 6px 30px",background:"var(--bg-input)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text-primary)",fontSize:12,fontFamily:"Inter,sans-serif",outline:"none",width:200}}
              placeholder="Ara..."
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
          </div>
          <button className="refresh-btn" onClick={onRefresh} disabled={loading}>
            {loading ? "⏳" : "🔄"} {loading ? "Yükleniyor" : "Yenile"}
          </button>
        </div>
      </div>

      {error && <div className="error-box">{error}</div>}

      <div className="cargo-table-wrap">
        {loading ? (
          <div className="loading-state">
            <div className="spinner"></div>
            <div className="loading-text">Siparişler yükleniyor...</div>
          </div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Sipariş Bilgileri</th>
                <th>Alıcı</th>
                <th>Ürün Görseli + Detayları</th>
                <th>Kargo Firması</th>
                <th>Kalan Teslimat Süresi</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan={5} style={{textAlign:"center",padding:40,color:"var(--text-muted)"}}>Sipariş bulunamadı</td></tr>
              ) : filtered.map(order => {
                const addr = order.shipmentAddress || {};
                const remaining = formatRemainingTime(order.estimatedDeliveryDate || order.agreedDeliveryDate);
                return (
                  <tr key={order.shipmentPackageId}>
                    <td>
                      <div style={{fontWeight:600,color:"var(--accent)",fontSize:12,marginBottom:3}}>#{order.orderNumber || order.shipmentPackageId}</div>
                      {order.orderDate && <div style={{fontSize:11,color:"var(--text-muted)"}}>{formatOrderDate(order.orderDate)}</div>}
                      {order.cargoTrackingNumber && <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:"monospace",marginTop:2}}>{order.cargoTrackingNumber}</div>}
                    </td>
                    <td>
                      <div style={{fontWeight:600,fontSize:13}}>{addr.firstName} {addr.lastName}</div>
                      <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{addr.district && addr.district + ", "}{addr.city}</div>
                    </td>
                    <td>
                      {(order.lines || []).slice(0,2).map((line,i) => (
                        <div key={i} style={{marginTop: i > 0 ? 8 : 0}}>
                          <ProductCell line={line}/>
                        </div>
                      ))}
                      {order.lines?.length > 2 && <div style={{fontSize:11,color:"var(--text-muted)",marginTop:6}}>+ {order.lines.length - 2} ürün daha</div>}
                    </td>
                    <td>
                      <div className="cargo-provider-chip">{order.cargoProviderName || "—"}</div>
                    </td>
                    <td>
                      {remaining
                        ? <span className={`time-badge ${remaining.type}`}>{remaining.text}</span>
                        : <span style={{color:"var(--text-muted)",fontSize:12}}>—</span>
                      }
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ===================== APP =====================
function App() {
  const [tab, setTab] = useState("orders");
  const [envLoaded, setEnvLoaded] = useState(false);
  const [orders, setOrders] = useState([]);
  const [selectedOrders, setSelectedOrders] = useState([]);
  const [printedOrders, setPrintedOrders] = useState([]);
  const [printedLoading, setPrintedLoading] = useState(true);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [currentPreview, setCurrentPreview] = useState(null);
  const [search, setSearch] = useState("");
  const [cargoFilter, setCargoFilter] = useState("Tümü");
  const [printFilter, setPrintFilter] = useState("Tümü");
  const [logoDataUrl, setLogoDataUrl] = useState("/text-1773078104872.png");
  const logoInputRef = useRef();
  const [settings, setSettings] = useState({
    labelWidth: 100, labelHeight: 100,
    fontFamily: "Arial, sans-serif", fontSize: 8,
    storeName: "Mağaza Adım", showProducts: true,
  });

  useEffect(() => {
    loadPrintedFromServer().then(ids => {
      setPrintedOrders(ids);
      setPrintedLoading(false);
    });
  }, []);

  useEffect(() => {
    fetch("/api/config")
      .then(r => r.json())
      .then(data => {
        if (data.hasConfig) {
          setEnvLoaded(true);
          fetchOrders();
        }
      })
      .catch(() => {});
  }, []);

  const fetchOrders = async () => {
    setLoading(true); setError("");
    try {
      const allOrders = [];
      let page = 0, totalPages = 1;
      while (page < totalPages) {
        const res = await fetch(`/api/orders?status=Created&size=200&page=${page}`);
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data.error || data));
        const mapped = (data.content || []).map(o => ({
          ...o,
          lines: (o.lines || []).map(l => ({ ...l, barcode: l.barcode || l.productBarcode || "" }))
        }));
        allOrders.push(...mapped);
        totalPages = data.totalPages || 1;
        page++;
      }
      setOrders(sortOrders(allOrders));
      if (allOrders.length === 0) setError("Bekleyen sipariş bulunamadı.");
    } catch(e) { setError("Hata: " + e.message); }
    finally { setLoading(false); }
  };

  const toggleSelect = (id) => setSelectedOrders(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const togglePrinted = async (id, e) => {
    e.stopPropagation();
    if (!window.confirm("Bu siparişin yazdırıldı işareti kaldırılsın mı?")) return;
    const updated = printedOrders.filter(x => x !== id);
    setPrintedOrders(updated);
    await removePrintedFromServer(id);
  };

  const handleClearPrinted = async () => {
    if (window.confirm("Tüm siparişlerin yazdırıldı işareti kaldırılsın mı?")) {
      setPrintedOrders([]);
      await savePrintedToServer([]);
    }
  };

  const handlePrint = async () => {
    const toPrint = orders.filter(o => selectedOrders.includes(o.shipmentPackageId));
    if (!toPrint.length) { alert("Lütfen en az bir sipariş seçin!"); return; }
    const printArea = document.getElementById("print-area");
    printArea.innerHTML = "";
    const fs = settings.fontSize;
    const labelW = Number(settings.labelWidth);
    toPrint.forEach(order => {
      const addr = order.shipmentAddress;
      const logoHtml = logoDataUrl
        ? `<img src="${logoDataUrl}" style="max-height:12mm;max-width:45mm;object-fit:contain;display:block"/>`
        : `<div style="font-weight:bold;font-size:${fs+2}pt">${settings.storeName||"LOGO"}</div>`;
      const productsHtml = settings.showProducts && order.lines.length > 0 ? `
        <div style="border-top:1px dashed #bbb;border-bottom:1px dashed #bbb;padding:1.5mm 0;margin-bottom:2.5mm;font-size:${fs-1}pt">
          <div style="font-size:${fs-2}pt;color:#888;text-transform:uppercase;letter-spacing:0.5px">ÜRÜNLER</div>
          ${order.lines.slice(0,4).map(l=>`<div style="margin-top:0.5mm">${l.quantity}x ${l.productName}${l.barcode?` <span style="color:#555;font-size:${fs-2}pt">[${l.barcode}]</span>`:""}</div>`).join("")}
          ${order.lines.length > 4 ? `<div style="margin-top:0.5mm;color:#888;font-style:italic">+ ${order.lines.length - 4} ürün daha</div>` : ""}
        </div>` : "";
      const div = document.createElement("div");
      div.style.cssText = `width:${labelW}mm;min-height:${settings.labelHeight}mm;font-family:${settings.fontFamily};font-size:${fs}pt;background:#fff;color:#000;padding:2mm;box-sizing:border-box;line-height:1.35;`;
      div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid #000;padding-bottom:2mm;margin-bottom:2.5mm">
          <div style="max-width:55%">${logoHtml}</div>
          <div style="text-align:right;font-size:${fs+1}pt;font-weight:bold">${order.cargoProviderName}</div>
        </div>
        <div style="margin-bottom:2.5mm">
          <div style="font-size:${fs-2}pt;color:#888;text-transform:uppercase;letter-spacing:0.5px">ALICI</div>
          <div style="font-weight:bold;font-size:${fs+5}pt;line-height:1.15">${addr.firstName} ${addr.lastName}</div>
          <div style="font-size:${fs}pt;margin-top:0.5mm">${addr.address1}</div>
          <div style="font-size:${fs}pt">${addr.district} / ${addr.city} ${addr.postalCode}</div>
        </div>
        ${productsHtml}
        <div style="text-align:center;margin-top:1mm">
          ${generateBarcodeSVG(order.cargoTrackingNumber, 55)}
          <div style="font-family:monospace;font-size:${fs+1}pt;letter-spacing:1.5px;margin-top:1mm">${order.cargoTrackingNumber}</div>
        </div>`;
      printArea.appendChild(div);
    });
    document.getElementById("app").style.display = "none";
    setTimeout(async () => {
      window.print();
      document.getElementById("app").style.display = "block";
      printArea.innerHTML = "";
      const newPrinted = [...new Set([...printedOrders, ...toPrint.map(o => o.shipmentPackageId)])];
      setPrintedOrders(newPrinted);
      await savePrintedToServer(newPrinted);
    }, 100);
  };

  const cargoProviders = ["Tümü", ...new Set(orders.map(o => o.cargoProviderName).filter(Boolean))];
  const printedCount = orders.filter(o => printedOrders.includes(o.shipmentPackageId)).length;
  const notPrintedCount = orders.length - printedCount;

  const filtered = orders.filter(o => {
    const q = search.toLowerCase();
    const matchSearch = !q ||
      (o.shipmentAddress.firstName + " " + o.shipmentAddress.lastName).toLowerCase().includes(q) ||
      (o.orderNumber || "").toLowerCase().includes(q);
    const matchCargo = cargoFilter === "Tümü" || o.cargoProviderName === cargoFilter;
    const isPrinted = printedOrders.includes(o.shipmentPackageId);
    const matchPrint =
      printFilter === "Tümü" ||
      (printFilter === "Yazdırıldı" && isPrinted) ||
      (printFilter === "Yazdırılmadı" && !isPrinted);
    return matchSearch && matchCargo && matchPrint;
  });

  const allFilteredSelected = filtered.length > 0 && filtered.every(o => selectedOrders.includes(o.shipmentPackageId));
  const handleSelectAll = () => {
    if (allFilteredSelected) {
      setSelectedOrders(prev => prev.filter(id => !filtered.map(o => o.shipmentPackageId).includes(id)));
    } else {
      setSelectedOrders(prev => [...new Set([...prev, ...filtered.map(o => o.shipmentPackageId)])]);
    }
  };

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* NAV */}
      <nav className="nav">
        <div className="nav-brand">Trendyol Kargo Etiketi Paneli</div>
        <div className="nav-tabs">
          {[
            {key:"orders", label:"Siparişler"},
            {key:"print", label:"Yazdır"},
            {key:"kargo", label:"Kargo Aşamasındakiler"},
          ].map(t => (
            <button key={t.key} className={`nav-tab${tab===t.key?" active":""}`} onClick={()=>setTab(t.key)}>
              {t.label}
              {t.key === "kargo" && orders.length > 0 &&
                <span style={{marginLeft:6,background:"var(--accent)",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700}}>{orders.length}</span>
              }
            </button>
          ))}
        </div>
      </nav>

      {/* KARGO TAB */}
      {tab === "kargo" && (
        <div className="layout" style={{flexDirection:"column"}}>
          <KargoTable orders={orders} loading={loading} error={error} onRefresh={fetchOrders}/>
        </div>
      )}

      {/* ORDERS + PRINT TABS */}
      {(tab === "orders" || tab === "print") && (
        <div className="layout">
          {/* LEFT PANEL */}
          <div className="left-panel">
            {/* Status bar */}
            <div className={`info-bar ${envLoaded ? "success" : "warning"}`}>
              {envLoaded ? "✅ API bilgileri yüklendi" : "⚠️ API bilgileri yüklenemedi"}
            </div>

            {/* Filters */}
            <div className="panel-header">
              <div className="search-box">
                <span className="search-icon">🔍</span>
                <input className="search-input" placeholder="Müşteri adı veya sipariş no..." value={search} onChange={e=>setSearch(e.target.value)}/>
              </div>
              <div className="filter-row" style={{marginBottom:8}}>
                <span className="filter-label">Kargo:</span>
                <select className="filter-select" value={cargoFilter} onChange={e=>setCargoFilter(e.target.value)}>
                  {cargoProviders.map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
              <div className="filter-chips">
                {[
                  {label:"Tümü", value:"Tümü", cls:""},
                  {label:`Yazdırılmadı (${notPrintedCount})`, value:"Yazdırılmadı", cls:"active-notprinted"},
                  {label:`Yazdırıldı (${printedCount})`, value:"Yazdırıldı", cls:"active-printed"},
                ].map(opt => (
                  <button key={opt.value} className={`chip${printFilter===opt.value?" "+(opt.cls||"active"):""}`}
                    onClick={() => setPrintFilter(opt.value)}>{opt.label}</button>
                ))}
              </div>
            </div>

            {/* Order list */}
            <div className="order-list">
              {loading && orders.length === 0 ? (
                <div className="loading-state"><div className="spinner"></div><div className="loading-text">Yükleniyor...</div></div>
              ) : filtered.length === 0 ? (
                <div style={{textAlign:"center",padding:32,color:"var(--text-muted)"}}>Sipariş bulunamadı</div>
              ) : filtered.map(order => {
                const sel = selectedOrders.includes(order.shipmentPackageId);
                const printed = printedOrders.includes(order.shipmentPackageId);
                return (
                  <div key={order.shipmentPackageId}
                    className={`order-card${sel?" selected":""}${printed&&!sel?" printed":""}`}
                    onClick={() => { toggleSelect(order.shipmentPackageId); setCurrentPreview(order); }}>
                    <div className="order-card-top">
                      <div className={`order-checkbox${sel?" checked":""}`}></div>
                      <div className="order-info">
                        <div className="order-name">{order.shipmentAddress.firstName} {order.shipmentAddress.lastName}</div>
                        <div className="order-meta">#{order.orderNumber}</div>
                        <div className="order-location">{order.shipmentAddress.district}, {order.shipmentAddress.city}</div>
                      </div>
                    </div>
                    <div className="order-card-bottom">
                      <div className="cargo-logo-placeholder">T</div>
                      <div className="cargo-name-small">{order.cargoProviderName}</div>
                      {printed ? (
                        <span className="printed-badge" onClick={(e) => togglePrinted(order.shipmentPackageId, e)}>
                          🖨️ Yazdırıldı ×
                        </span>
                      ) : (
                        <div className="product-count-badge">{order.lines.length} ürün</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Actions bar */}
            <div className="actions-bar">
              <div className="actions-bar-left">
                <span className="stat-text"><strong>{filtered.length}</strong> / {orders.length} sipariş</span>
                <button className="link-btn" onClick={handleSelectAll}>
                  {allFilteredSelected ? "Seçimi Kaldır" : "Tümünü Seç"}
                </button>
                {printedOrders.length > 0 && (
                  <button className="link-btn danger" onClick={handleClearPrinted}>🗑️ İşaretleri Kaldır</button>
                )}
              </div>
              <button className="refresh-btn" onClick={fetchOrders} disabled={loading} style={{padding:"5px 12px",fontSize:11}}>
                {loading ? "⏳" : "🔄"}
              </button>
            </div>
          </div>

          {/* RIGHT PANEL */}
          <div className="right-panel">
            {tab === "orders" && (
              <div className="preview-area">
                <div className="preview-label">Kargo Etiketi</div>
                {currentPreview
                  ? <div className="label-shadow"><LabelHTML order={currentPreview} settings={settings} logoDataUrl={logoDataUrl}/></div>
                  : <div className="preview-empty"><div className="preview-empty-icon">📦</div><div className="preview-empty-text">Önizleme için bir sipariş seçin</div></div>
                }
              </div>
            )}

            {tab === "print" && (
              <div className="print-layout">
                {/* Settings sidebar */}
                <div className="print-settings">
                  <div className="settings-section">
                    <div className="settings-section-title">Seçim Özeti</div>
                    <div style={{padding:"10px 12px",background:"var(--bg-elevated)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)"}}>
                      <div style={{fontSize:13,fontWeight:600}}>{selectedOrders.length} etiket seçildi</div>
                      <div style={{fontSize:11,color:"var(--text-muted)",marginTop:4}}>{settings.labelWidth}×{settings.labelHeight}mm boyut</div>
                    </div>
                    <button className="print-btn" onClick={handlePrint} disabled={!selectedOrders.length}>
                      🖨️ Yazdır
                    </button>
                    {selectedOrders.length === 0 && <div style={{fontSize:11,color:"var(--text-muted)",textAlign:"center"}}>Sol panelden sipariş seçin</div>}
                  </div>

                  <div style={{borderTop:"1px solid var(--border)"}}></div>

                  <div className="settings-section">
                    <div className="settings-section-title">Mağaza Logosu</div>
                    <input ref={logoInputRef} type="file" accept="image/*" onChange={e=>{
                      const file = e.target.files[0]; if(!file) return;
                      const reader = new FileReader();
                      reader.onload = ev => setLogoDataUrl(ev.target.result);
                      reader.readAsDataURL(file);
                    }} style={{display:"none"}}/>
                    <button className={`logo-upload-btn${logoDataUrl?" has-logo":""}`} onClick={()=>logoInputRef.current.click()}>
                      {logoDataUrl ? "✅ Logo yüklendi — değiştir" : "📁 Logo dosyası seç"}
                    </button>
                    {logoDataUrl && <div style={{textAlign:"center",background:"var(--bg-input)",borderRadius:6,padding:8}}><img src={logoDataUrl} alt="" style={{maxHeight:36,maxWidth:"100%",objectFit:"contain"}}/></div>}
                  </div>

                  <div className="settings-section">
                    <div className="settings-section-title">Yedek Mağaza Adı</div>
                    <input className="settings-input" type="text" value={settings.storeName}
                      onChange={e=>setSettings(p=>({...p,storeName:e.target.value}))} placeholder="Logo yoksa kullanılır"/>
                  </div>

                  <div className="settings-section">
                    <div className="settings-section-title">Etiket Boyutu</div>
                    <div className="settings-row">
                      <div className="settings-field">
                        <div className="settings-field-label">Genişlik</div>
                        <div className="settings-input-suffix">
                          <input className="settings-input" type="number" value={settings.labelWidth}
                            onChange={e=>setSettings(p=>({...p,labelWidth:Number(e.target.value)}))}/>
                          <span>mm</span>
                        </div>
                      </div>
                      <div className="settings-field">
                        <div className="settings-field-label">Yükseklik</div>
                        <div className="settings-input-suffix">
                          <input className="settings-input" type="number" value={settings.labelHeight}
                            onChange={e=>setSettings(p=>({...p,labelHeight:Number(e.target.value)}))}/>
                          <span>mm</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="settings-section">
                    <div className="settings-section-title">Yazı Boyutu</div>
                    <div className="settings-input-suffix">
                      <input className="settings-input" type="number" value={settings.fontSize}
                        onChange={e=>setSettings(p=>({...p,fontSize:Number(e.target.value)}))}/>
                      <span>pt</span>
                    </div>
                  </div>

                  <div className="settings-section">
                    <div className="toggle-row">
                      <div className="toggle-label">Ürün listesini göster</div>
                      <div className={`toggle${settings.showProducts?" on":""}`}
                        onClick={()=>setSettings(p=>({...p,showProducts:!p.showProducts}))}></div>
                    </div>
                  </div>

                  {printedOrders.length > 0 && (
                    <div className="printed-info">
                      <div>
                        <div className="printed-info-text">🖨️ {printedOrders.length} sipariş yazdırıldı</div>
                        <div className="printed-info-sub">Sunucuda kalıcı saklanır</div>
                      </div>
                      <button className="link-btn danger" onClick={handleClearPrinted}>Kaldır</button>
                    </div>
                  )}

                  <div style={{fontSize:11,color:"var(--text-muted)",lineHeight:1.8,padding:"8px 0",borderTop:"1px solid var(--border)"}}>
                    <strong style={{color:"var(--text-secondary)",display:"block",marginBottom:4}}>Termal yazıcı ayarları:</strong>
                    Sayfa boyutu: özel → {settings.labelWidth}×{settings.labelHeight}mm<br/>
                    Kenar boşlukları: sıfır
                  </div>
                </div>

                {/* Preview */}
                <div className="print-preview-area">
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
                    <div className="preview-label">Kargo Etiketi</div>
                    {currentPreview
                      ? <div className="label-shadow"><LabelHTML order={currentPreview} settings={settings} logoDataUrl={logoDataUrl}/></div>
                      : <div className="preview-empty"><div className="preview-empty-icon">📦</div><div className="preview-empty-text">Önizleme için sipariş seçin</div></div>
                    }
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
