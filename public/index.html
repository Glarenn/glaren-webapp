<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glaren Panel</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1117; color: #e2e8f0; font-family: system-ui, sans-serif; }
    input[type=text], input[type=password], input[type=number] {
      width: 100%; padding: 7px 10px; border-radius: 6px;
      border: 1px solid #2d3148; background: #1a1d27;
      color: #e2e8f0; font-size: 12px; outline: none;
    }
    input[type=checkbox] { accent-color: #f27a1a; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
    @media print {
      #app { display: none !important; }
      #print-area { display: block !important; }
      #print-area > div { page-break-after: always; page-break-inside: avoid; }
      #print-area > div:last-child { page-break-after: avoid !important; }
    }
    #print-area { display: none; }

    .kargo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      background: #fff;
      color: #1a1a2e;
    }
    .kargo-table th {
      background: #f8f9fa;
      border-bottom: 2px solid #dee2e6;
      border-right: 1px solid #dee2e6;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: #495057;
      white-space: nowrap;
    }
    .kargo-table th:last-child { border-right: none; }
    .kargo-table td {
      border-bottom: 1px solid #dee2e6;
      border-right: 1px solid #dee2e6;
      padding: 12px;
      vertical-align: top;
    }
    .kargo-table td:last-child { border-right: none; }
    .kargo-table tr:last-child td { border-bottom: none; }
    .kargo-table tr:hover td { background: #f8f9ff; }

    .badge-cargo {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      background: #fff3e0;
      color: #e65100;
      border: 1px solid #ffb74d;
    }
    .product-img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #dee2e6;
      flex-shrink: 0;
      background: #f0f0f0;
    }
    .product-img-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 6px;
      border: 1px solid #dee2e6;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .order-number {
      font-weight: 700;
      color: #f27a1a;
      font-size: 13px;
    }
    .kalan-sure {
      color: #16a34a;
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
    }
    .kalan-sure.urgent { color: #dc2626; }
    .product-name-link {
      color: #1d4ed8;
      font-weight: 600;
      font-size: 12px;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      margin-bottom: 4px;
    }
    .product-name-link:hover { text-decoration: underline; }
    .product-detail {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.6;
    }
    .product-detail span { color: #374151; }
    .trendyol-express {
      color: #f27a1a;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: -0.5px;
    }
    .tracking-no {
      font-family: monospace;
      font-size: 11px;
      color: #374151;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-top: 3px;
    }
    .cargo-sub {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .fatura-price {
      font-weight: 700;
      font-size: 14px;
      color: #111827;
    }
    .quantity-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: #f27a1a;
      color: #fff;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .filter-btn {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #dee2e6;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: #f27a1a;
      border-color: #f27a1a;
      color: #fff;
    }
    .filter-btn:hover:not(.active) {
      background: #f9fafb;
      border-color: #9ca3af;
    }
    .search-input-kargo {
      padding: 7px 12px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      width: 220px;
      background: #fff;
      color: #111;
    }
    .search-input-kargo:focus { border-color: #f27a1a; }
    .th-filter-icon { margin-left: 4px; opacity: 0.5; font-size: 10px; }
  </style>
</head>
<body>
<div id="app"></div>
<div id="print-area"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ===================== SUNUCU TARAFLI PRINTED API =====================

async function loadPrintedFromServer() {
  try {
    const res = await fetch("api/printed");
    const data = await res.json();
    return data.ids || [];
  } catch (e) {
    console.error("Yazdırma listesi yüklenemedi:", e);
    return [];
  }
}

async function savePrintedToServer(ids) {
  try {
    await fetch("api/printed", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ids }),
    });
  } catch (e) {
    console.error("Yazdırma listesi kaydedilemedi:", e);
  }
}

// ===================== YARDIMCI FONKSİYONLAR =====================

function sortOrders(list) {
  return [...list].sort((a, b) =>
    (b.shipmentPackageId || 0) - (a.shipmentPackageId || 0)
  );
}

function BarcodeImg({ value, height }) {
  const svgRef = useRef();
  useEffect(() => {
    if (!value || !svgRef.current) return;
    try {
      JsBarcode(svgRef.current, String(value), {
        format: "CODE128", width: 2.5, height: height,
        displayValue: false, margin: 0,
        background: "#ffffff", lineColor: "#000000",
      });
    } catch(e) { console.error("Barkod hatası:", e); }
  }, [value, height]);
  return <svg ref={svgRef} style={{display:"block", margin:"0 auto", maxWidth:"100%"}}></svg>;
}

function generateBarcodeSVG(value, height) {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  try {
    JsBarcode(svg, String(value), {
      format: "CODE128", width: 2.5, height: height,
      displayValue: false, margin: 0,
      background: "#ffffff", lineColor: "#000000",
    });
  } catch(e) { console.error("Barkod hatası:", e); }
  return svg.outerHTML;
}

function LabelHTML({ order, settings, logoDataUrl }) {
  const addr = order.shipmentAddress;
  const fs = settings.fontSize;
  const labelW = Number(settings.labelWidth);
  return (
    <div style={{
      width:`${labelW}mm`, minHeight:`${settings.labelHeight}mm`,
      fontFamily:settings.fontFamily, fontSize:`${fs}pt`,
      background:"#fff", color:"#000", padding:"2mm",
      boxSizing:"border-box", lineHeight:1.35, border:"1px solid #ccc"
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1.5px solid #000",paddingBottom:"2mm",marginBottom:"2.5mm"}}>
        <div style={{maxWidth:"55%"}}>
          {logoDataUrl
            ? <img src={logoDataUrl} alt="logo" style={{maxHeight:"12mm",maxWidth:"45mm",objectFit:"contain",display:"block"}}/>
            : <div style={{fontWeight:"bold",fontSize:`${fs+2}pt`}}>{settings.storeName||"LOGO"}</div>
          }
        </div>
        <div style={{textAlign:"right",fontSize:`${fs+1}pt`,fontWeight:"bold"}}>{order.cargoProviderName}</div>
      </div>
      <div style={{marginBottom:"2.5mm"}}>
        <div style={{fontSize:`${fs-2}pt`,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>ALICI</div>
        <div style={{fontWeight:"bold",fontSize:`${fs+5}pt`,lineHeight:1.15}}>{addr.firstName} {addr.lastName}</div>
        <div style={{fontSize:`${fs}pt`,marginTop:"0.5mm"}}>{addr.address1}</div>
        <div style={{fontSize:`${fs}pt`}}>{addr.district} / {addr.city} {addr.postalCode}</div>
      </div>
      {settings.showProducts && order.lines.length > 0 && (
        <div style={{borderTop:"1px dashed #bbb",borderBottom:"1px dashed #bbb",padding:"1.5mm 0",marginBottom:"2.5mm",fontSize:`${fs-1}pt`}}>
          <div style={{fontSize:`${fs-2}pt`,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>ÜRÜNLER</div>
          {order.lines.slice(0,4).map((l,i)=>(
            <div key={i} style={{marginTop:"0.5mm"}}>
              {l.quantity}x {l.productName}
              {l.barcode ? <span style={{color:"#555",marginLeft:"2mm",fontSize:`${fs-2}pt`}}>[{l.barcode}]</span> : null}
            </div>
          ))}
          {order.lines.length > 4 && <div style={{marginTop:"0.5mm",color:"#888",fontStyle:"italic"}}>+ {order.lines.length - 4} ürün daha</div>}
        </div>
      )}
      <div style={{textAlign:"center",marginTop:"1mm"}}>
        <BarcodeImg value={order.cargoTrackingNumber} height={55}/>
        <div style={{fontFamily:"monospace",fontSize:`${fs+1}pt`,letterSpacing:"1.5px",marginTop:"1mm"}}>
          {order.cargoTrackingNumber}
        </div>
      </div>
    </div>
  );
}

/* ===================== KARGO TABLOSU ===================== */

function formatRemainingTime(estimatedDeliveryDate) {
  if (!estimatedDeliveryDate) return null;
  const now = new Date();
  const target = new Date(estimatedDeliveryDate);
  const diffMs = target - now;
  if (diffMs <= 0) return { text: "Süresi Geçti", urgent: true };
  const hours = Math.floor(diffMs / 3600000);
  const mins = Math.floor((diffMs % 3600000) / 60000);
  if (hours >= 24) {
    const days = Math.floor(hours / 24);
    return { text: `${days} gün ${hours % 24} saat`, urgent: days < 1 };
  }
  return { text: `${hours} saat ${mins} dakika`, urgent: hours < 6 };
}

function formatOrderDate(dateMs) {
  if (!dateMs) return "";
  const d = new Date(dateMs - (3 * 60 * 60 * 1000));
  return d.toLocaleString("tr-TR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" });
}

function CargoProviderDisplay({ name }) {
  if (!name) return null;
  const lower = (name || "").toLowerCase();
  if (lower.includes("trendyol")) {
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          <span style={{color:"#f27a1a",fontWeight:900,fontSize:13,letterSpacing:"-0.5px"}}>trendyol</span>
          <span style={{background:"#f27a1a",color:"#fff",fontWeight:800,fontSize:9,padding:"1px 5px",borderRadius:3,letterSpacing:"0.5px"}}>express</span>
        </div>
      </div>
    );
  }
  if (lower.includes("aras")) return <span style={{fontWeight:700,fontSize:13,color:"#c00"}}>ARAS KARGO</span>;
  if (lower.includes("yurtiçi")) return <span style={{fontWeight:700,fontSize:13,color:"#003"}}>YURTİÇİ</span>;
  if (lower.includes("mng")) return <span style={{fontWeight:700,fontSize:13,color:"#e60"}}>MNG KARGO</span>;
  if (lower.includes("sürat")) return <span style={{fontWeight:700,fontSize:13,color:"#00a"}}>SÜRAT</span>;
  if (lower.includes("ups")) return <span style={{fontWeight:700,fontSize:13,color:"#4a2"}}>UPS</span>;
  if (lower.includes("ptt")) return <span style={{fontWeight:700,fontSize:13,color:"#c40"}}>PTT KARGO</span>;
  return <span style={{fontWeight:700,fontSize:13,color:"#374151"}}>{name}</span>;
}

function ProductRow({ line, isFirst }) {
  const [imgError, setImgError] = useState(false);
  const [enlarged, setEnlarged] = useState(false);
  const imageUrl = line.productImage || line.images?.[0]?.url || line.imageUrl ||
  (line.contentId ? `https://cdn.dsmcdn.com/ty${Math.floor(line.contentId/1000000)}/product/media/images/prod/PGW/${line.contentId}/images/alternative_0.jpg` : null);
  return (
    <div style={{display:"flex",gap:10,alignItems:"flex-start",paddingTop:isFirst?"0":"10px",marginTop:isFirst?"0":"10px",borderTop:isFirst?"none":"1px dashed #e5e7eb"}}>
      <div style={{flexShrink:0,position:"relative"}}>
        {imageUrl && !imgError
          ? <img src={imageUrl} alt={line.productName} className="product-img" onError={() => setImgError(true)} onClick={() => setEnlarged(true)} style={{cursor:"zoom-in"}}/>
          : <div className="product-img-placeholder">📦</div>
        }
        {enlarged && (
          <div style={{position:"fixed",top:0,left:0,width:"100vw",height:"100vh",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.5)"}} onClick={() => setEnlarged(false)}>
            <div style={{position:"relative"}} onClick={e => e.stopPropagation()}>
              <img src={imageUrl} alt={line.productName} style={{width:250,height:250,objectFit:"cover",borderRadius:10,border:"2px solid #fff",display:"block"}}/>
              <button onClick={() => setEnlarged(false)} style={{position:"absolute",top:-10,right:-10,width:24,height:24,borderRadius:"50%",border:"none",background:"#f27a1a",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          </div>
        )}
      </div>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:4}}>
          <span className="quantity-badge">{line.quantity || 1}</span>
          <a href="#" className="product-name-link" title={line.productName}>{line.productName}</a>
        </div>
        <div className="product-detail">
          {line.merchantSku && <div>Stok Kodu: <span>{line.merchantSku}</span></div>}
          {(line.productColor || line.attributes?.find(a=>a.name==="Renk")?.value) &&
            <div>Renk: <span>{line.productColor || line.attributes?.find(a=>a.name==="Renk")?.value}</span></div>
          }
          {(line.barcode || line.productBarcode) &&
            <div>Barkod: <span style={{fontFamily:"monospace"}}>{line.barcode || line.productBarcode}</span></div>
          }
          {(line.productSize || line.attributes?.find(a=>a.name==="Beden")?.value) &&
            <div>Beden: <span>{line.productSize || line.attributes?.find(a=>a.name==="Beden")?.value || "Tek Ebat"}</span></div>
          }
        </div>
      </div>
    </div>
  );
}

function KargoTable({ orders, loading, error }) {
  const [search, setSearch] = useState("");
  const [cargoFilter, setCargoFilter] = useState("Tümü");

  const cargoProviders = ["Tümü", ...new Set(orders.map(o => o.cargoProviderName).filter(Boolean))];

  const filtered = orders.filter(o => {
    const q = search.toLowerCase();
    const addr = o.shipmentAddress || {};
    const matchSearch = !q ||
      (addr.firstName + " " + addr.lastName).toLowerCase().includes(q) ||
      (o.orderNumber || "").toLowerCase().includes(q) ||
      (o.lines || []).some(l => (l.productName || "").toLowerCase().includes(q));
    const matchCargo = cargoFilter === "Tümü" || o.cargoProviderName === cargoFilter;
    return matchSearch && matchCargo;
  });

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:300,flexDirection:"column",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid #2d3148",borderTopColor:"#f27a1a",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}></div>
      <div style={{color:"#64748b",fontSize:13}}>Kargo aşamasındaki siparişler yükleniyor...</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if (error) return (
    <div style={{padding:24,margin:16,background:"#2d1515",borderRadius:8,color:"#f87171",fontSize:13,whiteSpace:"pre-wrap"}}>{error}</div>
  );

  if (!orders.length) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:300,flexDirection:"column",gap:12}}>
      <div style={{fontSize:48}}>🚚</div>
      <div style={{color:"#64748b",fontSize:14}}>Kargo aşamasında sipariş bulunamadı</div>
    </div>
  );

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"12px 20px",background:"#13161f",borderBottom:"1px solid #1e2235",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <input
          className="search-input-kargo"
          placeholder="🔍 Müşteri, sipariş no veya ürün ara..."
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#64748b",marginRight:4}}>Kargo:</span>
          {cargoProviders.map(c => (
            <button key={c} className={`filter-btn${cargoFilter===c?" active":""}`} onClick={() => setCargoFilter(c)}>{c}</button>
          ))}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:16,alignItems:"center"}}>
          <div style={{fontSize:12,color:"#64748b"}}>
            <span style={{color:"#e2e8f0",fontWeight:600}}>{filtered.length}</span> / {orders.length} sipariş
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",overflowX:"auto",background:"#f8fafc"}}>
        <table className="kargo-table" style={{minWidth:750}}>
          <thead style={{position:"sticky",top:0,zIndex:10}}>
            <tr>
              <th style={{minWidth:160}}>Sipariş Bilgileri <span className="th-filter-icon">▼</span></th>
              <th style={{minWidth:110}}>Alıcı</th>
              <th style={{minWidth:350}}>Bilgiler</th>
              <th style={{minWidth:130}}>Kargo <span className="th-filter-icon">▼</span></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(order => {
              const addr = order.shipmentAddress || {};
              const lines = order.lines || [];
              const remaining = formatRemainingTime(order.estimatedDeliveryDate || order.agreedDeliveryDate);
              return (
                <tr key={order.shipmentPackageId}>
                  <td style={{verticalAlign:"top"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                      <span style={{fontSize:16}}>🛍️</span>
                      <span className="order-number">#{order.orderNumber || order.shipmentPackageId}</span>
                    </div>
                    {order.orderDate && <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>Sipariş Tarihi: {formatOrderDate(order.orderDate)}</div>}
                    {order.shipmentPackageId && <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>Paket No: {order.shipmentPackageId}</div>}
                    {order.cargoTrackingNumber && <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>Teslimat No: {order.cargoTrackingNumber}</div>}
                    {remaining && (
                      <div className={`kalan-sure${remaining.urgent?" urgent":""}`}>
                        Kalan Süre:<br/>{remaining.text}
                      </div>
                    )}
                  </td>
                  <td style={{verticalAlign:"top"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                      <span style={{color:"#f59e0b",fontSize:14}}>★</span>
                      <span style={{fontWeight:600,fontSize:13,color:"#111827"}}>{addr.firstName} {addr.lastName}</span>
                    </div>
                    {addr.city && <div style={{fontSize:11,color:"#6b7280"}}>{addr.district && addr.district + ", "}{addr.city}</div>}
                  </td>
                  <td style={{verticalAlign:"top"}}>
                    {lines.map((line, i) => (
                      <ProductRow key={i} line={line} isFirst={i === 0} />
                    ))}
                  </td>
                  <td style={{verticalAlign:"top"}}>
                    <CargoProviderDisplay name={order.cargoProviderName} />
                    {order.cargoTrackingNumber && (
                      <div className="tracking-no">{order.cargoTrackingNumber}</div>
                    )}
                    <div className="cargo-sub">Trendyol anlaşmalı kargo</div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ===================== ANA UYGULAMA ===================== */

function App() {
  const [tab, setTab] = useState("etiketler");
  const [envLoaded, setEnvLoaded] = useState(false);

  const [orders, setOrders] = useState([]);
  const [selectedOrders, setSelectedOrders] = useState([]);
  const [printedOrders, setPrintedOrders] = useState([]);
  const [printedLoading, setPrintedLoading] = useState(true);

  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [search, setSearch] = useState("");
  const [cargoFilter, setCargoFilter] = useState("Tümü");
  const [printFilter, setPrintFilter] = useState("Tümü");
  const [logoDataUrl, setLogoDataUrl] = useState("/text-1773078104872.png");
  const logoInputRef = useRef();
  const [settings, setSettings] = useState({
    labelWidth:100, labelHeight:100,
    fontFamily:"Arial, sans-serif", fontSize:8,
    storeName:"Mağaza Adım", showProducts:true,
  });

  useEffect(() => {
    loadPrintedFromServer().then(ids => {
      setPrintedOrders(ids);
      setPrintedLoading(false);
    });
  }, []);

  const handleLogoUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setLogoDataUrl(ev.target.result);
    reader.readAsDataURL(file);
  };

  const fetchOrdersFromServer = async () => {
    setLoading(true); setError("");
    try {
      const allOrders = [];
      let page = 0;
      let totalPages = 1;
      while (page < totalPages) {
        const res = await fetch(`/api/orders?status=Created&size=200&page=${page}`);
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data.error||data));
        const list = data.content || [];
        const mapped = list.map(o => ({
          ...o,
          lines: (o.lines||[]).map(l => ({ ...l, barcode: l.barcode||l.productBarcode||"" }))
        }));
        allOrders.push(...mapped);
        totalPages = data.totalPages || 1;
        page++;
      }
      const sorted = sortOrders(allOrders);
      setOrders(sorted);
      if (sorted.length === 0) setError("Bekleyen sipariş bulunamadı.");
    } catch(e) { setError("Hata: " + e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => {
    fetch("/api/config")
      .then(r => r.json())
      .then(data => {
        if (data.hasConfig) {
          setEnvLoaded(true);
          fetchOrdersFromServer();
        }
      })
      .catch(() => {});
  }, []);

  const toggleSelect = (id) => setSelectedOrders(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);

  const getOrderIndex = (order) => orders.indexOf(order) + 1;

  const handlePrint = async () => {
    const toPrint = orders.filter(o => selectedOrders.includes(o.shipmentPackageId));
    if (!toPrint.length) { alert("Lütfen en az bir sipariş seçin!"); return; }
    const printArea = document.getElementById("print-area");
    printArea.innerHTML = "";
    const fs = settings.fontSize;
    const labelW = Number(settings.labelWidth);

    toPrint.forEach(order => {
      const addr = order.shipmentAddress;
      const logoHtml = logoDataUrl
        ? `<img src="${logoDataUrl}" style="max-height:12mm;max-width:45mm;object-fit:contain;display:block"/>`
        : `<div style="font-weight:bold;font-size:${fs+2}pt">${settings.storeName||"LOGO"}</div>`;
      const productsHtml = settings.showProducts && order.lines.length > 0 ? `
        <div style="border-top:1px dashed #bbb;border-bottom:1px dashed #bbb;padding:1.5mm 0;margin-bottom:2.5mm;font-size:${fs-1}pt">
          <div style="font-size:${fs-2}pt;color:#888;text-transform:uppercase;letter-spacing:0.5px">ÜRÜNLER</div>
          ${order.lines.slice(0,4).map(l=>`<div style="margin-top:0.5mm">${l.quantity}x ${l.productName}${l.barcode?` <span style="color:#555;font-size:${fs-2}pt">[${l.barcode}]</span>`:""}</div>`).join("")}
          ${order.lines.length > 4 ? `<div style="margin-top:0.5mm;color:#888;font-style:italic">+ ${order.lines.length - 4} ürün daha</div>` : ""}
        </div>` : "";
      const div = document.createElement("div");
      div.style.cssText = `width:${labelW}mm;min-height:${settings.labelHeight}mm;font-family:${settings.fontFamily};font-size:${fs}pt;background:#fff;color:#000;padding:2mm;box-sizing:border-box;line-height:1.35;`;
      div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid #000;padding-bottom:2mm;margin-bottom:2.5mm">
          <div style="max-width:55%">${logoHtml}</div>
          <div style="text-align:right;font-size:${fs+1}pt;font-weight:bold">${order.cargoProviderName}</div>
        </div>
        <div style="margin-bottom:2.5mm">
          <div style="font-size:${fs-2}pt;color:#888;text-transform:uppercase;letter-spacing:0.5px">ALICI</div>
          <div style="font-weight:bold;font-size:${fs+5}pt;line-height:1.15">${addr.firstName} ${addr.lastName}</div>
          <div style="font-size:${fs}pt;margin-top:0.5mm">${addr.address1}</div>
          <div style="font-size:${fs}pt">${addr.district} / ${addr.city} ${addr.postalCode}</div>
        </div>
        ${productsHtml}
        <div style="text-align:center;margin-top:1mm">
            ${generateBarcodeSVG(order.cargoTrackingNumber, 55)}
            <div style="font-family:monospace;font-size:${fs+1}pt;letter-spacing:1.5px;margin-top:1mm">${order.cargoTrackingNumber}</div>
          </div>`;
      printArea.appendChild(div);
    });

    document.getElementById("app").style.display = "none";
    setTimeout(async () => {
      window.print();
      document.getElementById("app").style.display = "block";
      printArea.innerHTML = "";
      const newPrinted = [...new Set([...printedOrders, ...toPrint.map(o => o.shipmentPackageId)])];
      setPrintedOrders(newPrinted);
      await savePrintedToServer(newPrinted);
    }, 100);
  };

  const btn = (label, t) => (
    <button onClick={()=>setTab(t)} style={{
      padding:"6px 14px", borderRadius:6, border:"none", cursor:"pointer", fontSize:12, fontWeight:600,
      background:tab===t?"#f27a1a":"#2d3148", color:tab===t?"#fff":"#94a3b8"
    }}>{label}</button>
  );

  const filtered = orders.filter(o => {
    const q = search.toLowerCase();
    const matchSearch = !q ||
      (o.shipmentAddress.firstName+" "+o.shipmentAddress.lastName).toLowerCase().includes(q) ||
      (o.orderNumber||"").toLowerCase().includes(q);
    const matchCargo = cargoFilter==="Tümü" || o.cargoProviderName===cargoFilter;
    const isPrinted = printedOrders.includes(o.shipmentPackageId);
    const matchPrint = printFilter==="Tümü" || (printFilter==="Yazdırıldı" && isPrinted) || (printFilter==="Yazdırılmadı" && !isPrinted);
    return matchSearch && matchCargo && matchPrint;
  });

  const printedCount = orders.filter(o => printedOrders.includes(o.shipmentPackageId)).length;
  const notPrintedCount = orders.length - printedCount;

  const allFilteredSelected = filtered.length > 0 && filtered.every(o => selectedOrders.includes(o.shipmentPackageId));
  const handleSelectAll = () => {
    if (allFilteredSelected) {
      setSelectedOrders(prev => prev.filter(id => !filtered.map(o => o.shipmentPackageId).includes(id)));
    } else {
      setSelectedOrders(prev => [...new Set([...prev, ...filtered.map(o => o.shipmentPackageId)])]);
    }
  };

  return (
    <div style={{height:"100vh",background:"#0f1117",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:"#1a1d27",borderBottom:"1px solid #2d3148",padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style={{fontWeight:700,fontSize:15,letterSpacing:"0.5px"}}>Glaren Panel</div>
        <div style={{display:"flex",gap:8}}>
          {btn("🏷️ Etiketler","etiketler")}
          <button onClick={()=>setTab("kargo")} style={{
            padding:"8px 18px", borderRadius:6, border:"none", cursor:"pointer", fontSize:14, fontWeight:600,
            background:tab==="kargo"?"#f27a1a":"#2d3148", color:tab==="kargo"?"#fff":"#94a3b8",
            display:"flex", alignItems:"center", gap:6
          }}>
            🚚 Kargo Aşamasındakiler
            {orders.length > 0 && (
              <span style={{background:"rgba(255,255,255,0.25)",borderRadius:10,padding:"2px 9px",fontSize:13,fontWeight:700}}>
                {orders.length}
              </span>
            )}
          </button>
        </div>
      </div>

      {/* Kargo Aşamasındakiler */}
      {tab === "kargo" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{background:"#13161f",borderBottom:"1px solid #1e2235",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>🚚</span>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:"#e2e8f0"}}>Kargo Aşamasındaki Siparişler</div>
                <div style={{fontSize:11,color:"#64748b",marginTop:1}}>Yeni (Created) statüsündeki siparişler</div>
              </div>
            </div>
            <button onClick={fetchOrdersFromServer} disabled={loading} style={{
              padding:"7px 16px",borderRadius:6,border:"none",cursor:"pointer",
              background:loading?"#374151":"#f27a1a",color:"#fff",fontWeight:600,fontSize:12,
              display:"flex",alignItems:"center",gap:6
            }}>
              {loading ? "⏳ Yükleniyor..." : "🔄 Yenile"}
            </button>
          </div>
          {error && orders.length === 0 ? (
            <div style={{padding:24,margin:16,background:"#2d1515",borderRadius:8,color:"#f87171",fontSize:13}}>{error}</div>
          ) : (
            <KargoTable orders={orders} loading={loading} error={""} />
          )}
        </div>
      )}

      {/* Etiketler — Sol: Sipariş listesi, Sağ: Yazdır paneli */}
      {tab === "etiketler" && (
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>

          {/* SOL PANEL: Sipariş listesi */}
          <div style={{width:380,background:"#13161f",borderRight:"1px solid #1e2235",overflowY:"auto",flexShrink:0,display:"flex",flexDirection:"column"}}>
            <div style={{padding:16,borderBottom:"1px solid #1e2235"}}>
              <button onClick={fetchOrdersFromServer} disabled={loading} style={{
                width:"100%",padding:"8px",borderRadius:6,border:"none",cursor:"pointer",
                background:loading?"#374151":"#f27a1a",color:"#fff",fontWeight:600,fontSize:12
              }}>{loading?"⏳ Yükleniyor...":"🔄 Yeni Siparişleri Getir"}</button>
              {error && <div style={{marginTop:8,padding:"8px 10px",background:"#2d1515",borderRadius:6,color:"#f87171",fontSize:12,whiteSpace:"pre-wrap"}}>{error}</div>}
            </div>

            <div style={{padding:"12px 16px",flex:1,overflowY:"auto"}}>
              <input type="text" placeholder="🔍 Müşteri adı veya sipariş no..." value={search}
                onChange={e=>setSearch(e.target.value)} style={{marginBottom:8}}/>

              <div style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>Kargo Firması</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
                {["Tümü", ...new Set(orders.map(o=>o.cargoProviderName))].map(cargo=>(
                  <button key={cargo} onClick={()=>setCargoFilter(cargo)} style={{
                    padding:"3px 8px",borderRadius:4,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,
                    background:cargoFilter===cargo?"#f27a1a":"#2d3148",
                    color:cargoFilter===cargo?"#fff":"#94a3b8"
                  }}>{cargo}</button>
                ))}
              </div>

              <div style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>Baskı Durumu</div>
              <div style={{display:"flex",gap:4,marginBottom:10}}>
                {[
                  {label:"Tümü", value:"Tümü"},
                  {label:`Yazdırılmadı (${notPrintedCount})`, value:"Yazdırılmadı"},
                  {label:`Yazdırıldı (${printedCount})`, value:"Yazdırıldı"},
                ].map(opt=>(
                  <button key={opt.value} onClick={()=>setPrintFilter(opt.value)} style={{
                    padding:"3px 8px",borderRadius:4,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,
                    background:printFilter===opt.value
                      ? (opt.value==="Yazdırıldı"?"#6366f1":opt.value==="Yazdırılmadı"?"#16a34a":"#f27a1a")
                      :"#2d3148",
                    color:printFilter===opt.value?"#fff":"#94a3b8"
                  }}>{opt.label}</button>
                ))}
              </div>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase"}}>{filtered.length} / {orders.length} Sipariş</div>
                <button onClick={handleSelectAll}
                  style={{fontSize:11,color:allFilteredSelected?"#f87171":"#f27a1a",background:"none",border:"none",cursor:"pointer"}}>
                  {allFilteredSelected ? "Seçimi Kaldır" : "Tümünü Seç"}
                </button>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {filtered.map(order => {
                  const sel = selectedOrders.includes(order.shipmentPackageId);
                  const printed = printedOrders.includes(order.shipmentPackageId);
                  return (
                    <div key={order.shipmentPackageId}
                      onClick={()=>toggleSelect(order.shipmentPackageId)}
                      style={{padding:"10px 12px",borderRadius:8,cursor:"pointer",
                        background:sel?"#1e2d1a":printed?"#1a1a2e":"#1a1d27",
                        border:`1px solid ${sel?"#4ade80":printed?"#6366f1":"#2d3148"}`,
                        opacity:printed?0.75:1}}>
                      <div style={{display:"flex",justifyContent:"space-between"}}>
                        <div>
                          <div style={{fontWeight:600,fontSize:13}}>{order.shipmentAddress.firstName} {order.shipmentAddress.lastName}</div>
                          <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{order.orderNumber}</div>
                          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{order.shipmentAddress.district}, {order.shipmentAddress.city}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"#1e2235",color:"#f27a1a",fontWeight:600}}>{order.cargoProviderName}</span>
                          <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>{order.lines.length} ürün</div>
                        </div>
                      </div>
                      <div style={{marginTop:4,display:"flex",gap:6,alignItems:"center"}}>
                        {sel && <span style={{fontSize:10,color:"#4ade80",fontWeight:600}}>✓ Seçildi</span>}
                        {printed && <span style={{fontSize:10,color:"#818cf8",fontWeight:600}}>🖨️ Yazdırıldı</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* SAĞ PANEL: Yazdırma ekranı */}
          <div style={{flex:1,background:"#0d1018",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 32px"}}>
            <div style={{width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:20}}>

              {/* Seçili sipariş sayısı */}
              <div style={{background:"#1a1d27",borderRadius:12,border:"1px solid #2d3148",padding:"24px 28px",textAlign:"center"}}>
                <div style={{fontSize:48,fontWeight:800,color:selectedOrders.length?"#f27a1a":"#374151",lineHeight:1}}>
                  {selectedOrders.length}
                </div>
                <div style={{fontSize:14,color:"#64748b",marginTop:8}}>
                  {selectedOrders.length === 0
                    ? "Henüz sipariş seçilmedi"
                    : selectedOrders.length === 1
                      ? "sipariş seçildi"
                      : "sipariş seçildi"
                  }
                </div>
                {selectedOrders.length > 0 && (
                  <div style={{fontSize:11,color:"#475569",marginTop:6}}>
                    Etiket boyutu: {settings.labelWidth}×{settings.labelHeight}mm
                  </div>
                )}
              </div>

              {/* Yazdır butonu */}
              <button onClick={handlePrint} disabled={selectedOrders.length === 0} style={{
                width:"100%",padding:"16px",borderRadius:10,border:"none",cursor:selectedOrders.length?"pointer":"not-allowed",
                background:selectedOrders.length?"#f27a1a":"#1e2235",
                color:selectedOrders.length?"#fff":"#475569",
                fontWeight:700,fontSize:16,
                transition:"all 0.15s",
                boxShadow:selectedOrders.length?"0 4px 20px rgba(242,122,26,0.35)":"none"
              }}>
                🖨️ Yazdır
              </button>



              {printedOrders.length > 0 && (
                <div style={{padding:"12px 16px",background:"#1a1a2e",borderRadius:8,border:"1px solid #6366f1",textAlign:"center"}}>
                  <div style={{fontSize:12,color:"#818cf8",fontWeight:600}}>🖨️ {printedOrders.length} sipariş daha önce yazdırıldı</div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
